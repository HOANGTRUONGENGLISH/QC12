    <style>
        @keyframes pulseBorder {

            0%,
            100% {
                border-color: rgba(244, 63, 94, 0.8);
                box-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
            }

            50% {
                border-color: rgba(244, 63, 94, 0.2);
                box-shadow: 0 0 5px rgba(244, 63, 94, 0.0);
            }
        }

        .animate-pulse-border {
            animation: pulseBorder 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* ANIMATIONS FOR MARINE LIFE BACKGROUND */
        @keyframes swimRtoL {
            0% {
                transform: translateX(120vw) scaleX(-1);
            }

            100% {
                transform: translateX(-20vw) scaleX(-1);
            }
        }

        @keyframes swimLtoR {
            0% {
                transform: translateX(-20vw);
            }

            100% {
                transform: translateX(120vw);
            }
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }
        }

        @keyframes waveRoll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 0.6;
            }

            80% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        .swim-r-to-l {
            animation: swimRtoL var(--duration, 20s) linear infinite;
            animation-delay: var(--delay, 0s);
        }

        .swim-l-to-r {
            animation: swimLtoR var(--duration, 20s) linear infinite;
            animation-delay: var(--delay, 0s);
        }

        .sway {
            animation: sway var(--duration, 4s) ease-in-out infinite;
            transform-origin: bottom center;
        }

        .wave-roll {
            animation: waveRoll var(--duration, 15s) linear infinite;
        }

        .float-up {
            animation: floatUp var(--duration, 10s) ease-in infinite;
            animation-delay: var(--delay, 0s);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;

        .custom-scrollbar::-webkit-scrollbar-thumb {

        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {

        // ----- ÂM THANH (Web Audio API) -----
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    // Âm thanh báo Đúng (Tiếng Ting cao)
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                } else {
                    // Âm thanh báo Sai (Tiếng bíp trầm)
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(250, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                }

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.error("Trình duyệt không hỗ trợ Web Audio API", e);
            }
        };

        // ----- LOGIC ỨNG DỤNG -----
        function App() {
            const [gameState, setGameState] = useState('welcome');
            const [userName, setUserName] = useState('');
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [finishDate, setFinishDate] = useState(null);

            const inputRef = useRef(null);

            useEffect(() => {
                let timer;
                if (gameState === 'playing') {
                    timer = setInterval(() => {
                        setTimeElapsed((prev) => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [gameState]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') {
                        if (gameState === 'welcome' && userName.trim() !== '') {
                            startQuiz();
                        } else if (gameState === 'playing') {
                            const currentAns = answers[currentIdx];
                            if (currentAns?.resolved) {
                                handleNext();
                            }
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, userName, currentIdx, answers]);

            const startQuiz = () => {
                setGameState('playing');
                setTimeElapsed(0);
                setCurrentIdx(0);
                setAnswers({});
            };

            const handleNext = () => {
                if (currentIdx < QUESTIONS.length - 1) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    finishQuiz();
                }
            };

            const handleBack = () => {
                if (currentIdx > 0) {
                    setCurrentIdx(currentIdx - 1);
                }
            };

            const selectOption = (optIdx) => {
                const currentQ = QUESTIONS[currentIdx];
                const currentAns = answers[currentIdx] || { attempts: [], resolved: false, firstTryCorrect: false };

                if (currentAns.resolved || currentAns.attempts.includes(optIdx)) return;

                const newAttempts = [...currentAns.attempts, optIdx];
                let isResolved = false;
                let isFirstTryCorrect = false;

                if (optIdx === currentQ.answer) {
                    playSound('correct'); // Phát âm thanh ĐÚNG
                    isResolved = true;
                    if (newAttempts.length === 1) {
                        isFirstTryCorrect = true;
                    }
                } else {
                    playSound('incorrect'); // Phát âm thanh SAI
                    if (newAttempts.length >= 2) {
                        isResolved = true;
                    }
                }

                setAnswers({
                    ...answers,
                    [currentIdx]: {
                        attempts: newAttempts,
                        resolved: isResolved,
                        firstTryCorrect: isFirstTryCorrect
                    }
                });
            };

            const finishQuiz = () => {
                setFinishDate(new Date());
                setGameState('summary');
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const calculateScore = () => {
                let correct = 0;
                QUESTIONS.forEach((q, idx) => {
                    if (answers[idx]?.firstTryCorrect) correct++;
                });
                return correct;
            };

            const optionLabels = ["A", "B", "C", "D"];

            return (
                <div className="min-h-screen font-sans text-slate-800 bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] flex flex-col items-center justify-between p-4 sm:p-8 relative overflow-hidden">

                    {/* GỌI THÀNH PHẦN BACKGROUND */}
                    <MarineBackground />

                    <div className="w-full max-w-4xl z-10 flex-grow flex flex-col justify-center items-center">

                        {gameState === 'welcome' && (
                            <div className="bg-white/10 backdrop-blur-lg border border-white/20 p-10 rounded-3xl shadow-2xl w-full max-w-md text-center transform transition-all">
                                <div className="flex justify-center mb-6 text-cyan-300 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]">
                                    <Anchor size={64} className="animate-bounce" style={{ animationDuration: '3s' }} />
                                </div>
                                <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-200 mb-2 drop-shadow-sm">
                                    Welcome to HTE
                                </h1>
                                <p className="text-cyan-100/80 mb-8 font-light">Practice - 5 Tenses for Grade 9</p>

                                <div className="mb-8">
                                    <label className="block text-left text-sm font-medium text-cyan-200 mb-2">Please enter your name:</label>
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        autoFocus
                                        className="w-full px-5 py-4 rounded-xl bg-white/5 border border-cyan-400/30 text-white focus:outline-none focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300/50 transition-all text-lg"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && userName.trim() !== '' && startQuiz()}
                                    />
                                </div>

                                <button
                                    onClick={startQuiz}
                                    disabled={userName.trim() === ''}
                                    className={`w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all duration-300 ${userName.trim() !== '' ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white hover:shadow-[0_0_20px_rgba(6,182,212,0.6)] hover:scale-[1.02]' : 'bg-gray-500/50 text-gray-300 cursor-not-allowed'}`}
                                >
                                    Start <ArrowRight size={20} />
                                </button>
                            </div>
                        )}

                        {gameState === 'playing' && (
                            <div className="w-full">
                                <div className="flex flex-wrap justify-between items-center bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-2xl mb-6 text-cyan-50 shadow-lg">
                                    <div className="flex items-center gap-2 font-medium">
                                        <User size={18} className="text-cyan-300" />
                                        <span className="truncate max-w-[150px] sm:max-w-xs">{userName}</span>
                                    </div>
                                    <div className="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 to-blue-200">
                                        Question {currentIdx + 1} / {QUESTIONS.length}
                                    </div>
                                    <div className="flex items-center gap-2 font-mono text-cyan-200 bg-black/20 px-4 py-1.5 rounded-lg">
                                        <Clock size={18} className="animate-pulse" /> {formatTime(timeElapsed)}
                                    </div>
                                </div>

                                <div className="w-full bg-black/20 h-2 rounded-full mb-8 overflow-hidden">
                                    <div
                                        className="h-full bg-gradient-to-r from-cyan-400 to-blue-500 transition-all duration-300 ease-out"
                                        style={{ width: `${((currentIdx + 1) / QUESTIONS.length) * 100}%` }}
                                    ></div>
                                </div>

                                <div className="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 sm:p-10 shadow-2xl mb-4">
                                    <h2 className="text-2xl sm:text-3xl font-semibold text-white mb-8 leading-relaxed">
                                        <span className="text-cyan-400 mr-2">{currentIdx + 1}.</span>
                                        {QUESTIONS[currentIdx].text}
                                    </h2>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {QUESTIONS[currentIdx].options.map((opt, idx) => {
                                            const currentQ = QUESTIONS[currentIdx];
                                            const currentAnsInfo = answers[currentIdx] || { attempts: [], resolved: false };
                                            const isSelected = currentAnsInfo.attempts.includes(idx);
                                            const isCorrectAns = idx === currentQ.answer;

                                            let btnClass = "flex items-center p-4 rounded-2xl text-left border-2 transition-all duration-200 group ";
                                            let iconClass = "w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-full mr-4 font-bold text-lg transition-colors ";
                                            let textClass = "text-lg transition-colors ";

                                            if (currentAnsInfo.resolved && isCorrectAns) {
                                                btnClass += "bg-emerald-500/20 border-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.3)]";
                                                iconClass += "bg-emerald-400 text-[#0f2027]";
                                                textClass += "text-white font-medium";
                                            } else if (isSelected && !isCorrectAns) {
                                                btnClass += "bg-rose-500/10 border-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.3)] animate-pulse-border cursor-not-allowed";
                                                iconClass += "bg-rose-500/80 text-white";
                                                textClass += "text-rose-200 line-through opacity-70";
                                            } else {
                                                btnClass += "bg-white/5 border-transparent hover:bg-white/10 hover:border-cyan-500/50 cursor-pointer";
                                                iconClass += "bg-white/10 text-cyan-100 group-hover:bg-cyan-500/30";
                                                textClass += "text-cyan-50";
                                            }

                                            return (
                                                <button
                                                    key={idx}
                                                    onClick={() => selectOption(idx)}
                                                    disabled={currentAnsInfo.resolved || isSelected}
                                                    className={btnClass}
                                                >
                                                    <div className={iconClass}>
                                                        {optionLabels[idx]}
                                                    </div>
                                                    <span className={textClass}>{opt}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    <div className="mt-6 text-center min-h-[24px]">
                                        {(() => {
                                            const currentAnsInfo = answers[currentIdx] || { attempts: [], resolved: false, firstTryCorrect: false };
                                            if (currentAnsInfo.resolved) {
                                                return currentAnsInfo.firstTryCorrect
                                                    ? <span className="text-emerald-400 font-medium animate-pulse">Excellent! Correct answer.</span>
                                                    : <span className="text-amber-400 font-medium">The correct answer has been revealed.</span>;
                                            } else if (currentAnsInfo.attempts.length > 0) {
                                                return <span className="text-rose-400 font-medium">Incorrect. Please try again! (Attempts left: {2 - currentAnsInfo.attempts.length})</span>;
                                            }
                                            return null;
                                        })()}
                                    </div>
                                </div>

                                <div className="flex flex-col-reverse sm:flex-row justify-between items-center gap-4 sm:gap-0 mt-4 w-full">
                                    <button
                                        onClick={handleBack}
                                        disabled={currentIdx === 0}
                                        className={`flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-4 sm:py-3 rounded-xl font-medium transition-all ${currentIdx === 0 ? 'opacity-0 cursor-default hidden sm:flex' : 'bg-white/10 text-white hover:bg-white/20 border border-white/20 hover:border-white/40'}`}
                                    >
                                        <ArrowLeft size={20} /> Back
                                    </button>

                                    <div className="flex flex-col items-center sm:items-end w-full sm:w-auto">
                                        <button
                                            onClick={handleNext}
                                            disabled={!(answers[currentIdx]?.resolved)}
                                            className={`flex items-center justify-center gap-2 w-full sm:w-auto px-8 py-4 rounded-xl font-bold text-lg transition-all 
                        ${answers[currentIdx]?.resolved
                                                    ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white hover:shadow-[0_0_20px_rgba(6,182,212,0.6)] hover:scale-105 cursor-pointer'
                                                    : 'bg-slate-700/50 text-slate-400 border border-slate-600/50 cursor-not-allowed'}`}
                                        >
                                            {currentIdx === QUESTIONS.length - 1 ? 'Finish Quiz' : 'Next Question'}
                                            {currentIdx === QUESTIONS.length - 1 ? <CheckCircle2 size={20} /> : <ArrowRight size={20} />}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {gameState === 'summary' && (
                            <div className="w-full bg-white/10 backdrop-blur-xl border border-white/20 p-6 sm:p-10 rounded-3xl shadow-2xl relative">
                                <div className="text-center mb-10">
                                    <div className="inline-flex justify-center items-center w-20 h-20 bg-gradient-to-tr from-cyan-400 to-blue-500 rounded-full mb-4 shadow-[0_0_30px_rgba(34,211,238,0.5)]">
                                        <WavesIcon size={40} className="text-white" />
                                    </div>
                                    <h1 className="text-4xl font-bold text-white mb-2">Quiz Summary</h1>
                                    <p className="text-xl text-cyan-200">Excellent effort, {userName}!</p>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                                    <div className="bg-black/20 p-4 rounded-2xl border border-white/10 flex flex-col items-center justify-center text-center">
                                        <Calendar className="text-cyan-400 mb-2" size={24} />
                                        <div className="text-xs text-cyan-100/70 mb-1">Date Completed</div>
                                        <div className="text-sm font-medium text-white">{finishDate?.toLocaleDateString('vi-VN')} {finishDate?.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })}</div>
                                    </div>
                                    <div className="bg-black/20 p-4 rounded-2xl border border-white/10 flex flex-col items-center justify-center text-center">
                                        <Clock className="text-blue-400 mb-2" size={24} />
                                        <div className="text-xs text-cyan-100/70 mb-1">Time Taken</div>
                                        <div className="text-lg font-bold text-white">{formatTime(timeElapsed)}</div>
                                    </div>
                                    <div className="bg-black/20 p-4 rounded-2xl border border-white/10 flex flex-col items-center justify-center text-center">
                                        <CheckCircle2 className="text-emerald-400 mb-2" size={24} />
                                        <div className="text-xs text-cyan-100/70 mb-1">Correct (1st Try)</div>
                                        <div className="text-2xl font-bold text-emerald-400">{calculateScore()}</div>
                                    </div>
                                    <div className="bg-black/20 p-4 rounded-2xl border border-white/10 flex flex-col items-center justify-center text-center">
                                        <XCircle className="text-rose-400 mb-2" size={24} />
                                        <div className="text-xs text-cyan-100/70 mb-1">Needed Retries</div>
                                        <div className="text-2xl font-bold text-rose-400">{QUESTIONS.length - calculateScore()}</div>
                                    </div>
                                </div>

                                <div className="mb-10 text-center">
                                    <div className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-300 mb-4">
                                        {Math.round((calculateScore() / QUESTIONS.length) * 100)}%
                                    </div>
                                    <div className="w-full max-w-md mx-auto bg-black/30 h-4 rounded-full overflow-hidden border border-white/10">
                                        <div
                                            className="h-full bg-gradient-to-r from-rose-500 via-yellow-400 to-emerald-500 transition-all duration-1000"
                                            style={{ width: `${(calculateScore() / QUESTIONS.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>

                                <div className="mt-8 border-t border-white/20 pt-8">
                                    <h3 className="text-2xl font-semibold text-white mb-6">Detailed Review</h3>
                                    <div className="space-y-4 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                                        {QUESTIONS.map((q, idx) => {
                                            const ansInfo = answers[idx] || { attempts: [], firstTryCorrect: false };
                                            const isCorrect = ansInfo.firstTryCorrect;
                                            const firstGuessIdx = ansInfo.attempts[0];
                                            const isUnanswered = ansInfo.attempts.length === 0;

                                            return (
                                                <div key={idx} className={`p-5 rounded-2xl border ${isCorrect ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-rose-900/20 border-rose-500/30'} flex flex-col sm:flex-row gap-4 sm:items-center`}>
                                                    <div className="flex-shrink-0 mt-1 sm:mt-0">
                                                        {isCorrect ? <CheckCircle2 className="text-emerald-400" size={28} /> : <XCircle className="text-rose-400" size={28} />}
                                                    </div>
                                                    <div className="flex-grow">
                                                        <p className="text-white font-medium text-lg mb-2"><span className="opacity-50 mr-2">{q.id}.</span> {q.text}</p>
                                                        <div className="grid sm:grid-cols-2 gap-2 text-sm">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-white/50">Your First Try:</span>
                                                                <span className={`font-semibold px-2 py-1 rounded ${isCorrect ? 'bg-emerald-500/20 text-emerald-300' : 'bg-rose-500/20 text-rose-300'}`}>
                                                                    {isUnanswered ? "None" : `${optionLabels[firstGuessIdx]}. ${q.options[firstGuessIdx]}`}
                                                                </span>
                                                            </div>
                                                            {!isCorrect && (
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-white/50">Correct Answer:</span>
                                                                    <span className="font-semibold bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded">
                                                                        {optionLabels[q.answer]}. {q.options[q.answer]}
                                                                    </span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="mt-8 flex justify-center">
                                    <button
                                        onClick={() => window.location.reload()}
                                        className="px-8 py-3 rounded-xl font-bold bg-white/10 hover:bg-white/20 text-white border border-white/30 transition-all flex items-center gap-2"
                                    >
                                        <Clock size={18} /> Retake Quiz
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="w-full text-center py-6 mt-8 z-10">
                        <p className="text-cyan-200/50 text-sm font-medium tracking-wide">
                            © Copyright by <span className="text-cyan-400/80">Hoang Truong English</span>
                        </p>
                    </footer>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
