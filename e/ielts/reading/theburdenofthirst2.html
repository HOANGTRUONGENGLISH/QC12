<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS VOCAB - THE BURDEN OF THIRST 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts: Share Tech Mono for engineering vibe, Nunito for readability -->
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bp-dark: #0f172a;
            /* Slate 900 */
            --bp-grid: #1e293b;
            /* Slate 800 */
            --bp-line: #38bdf8;
            /* Light Blue / Cyan */
            --water-pure: #06b6d4;
            /* Cyan 500 */
            --water-glow: #22d3ee;
            /* Cyan 400 */
            --eng-yellow: #eab308;
            /* Yellow 500 */
            --eng-gray: #f8fafc;
            /* Slate 50 */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bp-dark);
            /* Blueprint Grid Pattern */
            background-image:
                linear-gradient(var(--bp-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bp-grid) 1px, transparent 1px),
                linear-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
            background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
            color: var(--eng-gray);
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 1rem;
        }

        .font-tech {
            font-family: 'Share Tech Mono', monospace;
        }

        /* --- Main Frame (Control Panel) --- */
        .app-container {
            background-color: rgba(15, 23, 42, 0.85);
            border: 2px solid var(--water-pure);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2), inset 0 0 20px rgba(6, 182, 212, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* Corner Accents for Engineering look */
        .app-container::before,
        .app-container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--eng-yellow);
            pointer-events: none;
        }

        .app-container::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .app-container::after {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        /* --- Flip Card Structure --- */
        .flip-card {
            perspective: 2000px;
            width: 100%;
            height: 100%;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(-180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.95);
            /* Slate 800 */
            border: 1px solid var(--water-pure);
        }

        .flip-card-back {
            transform: rotateY(-180deg);
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(15, 23, 42, 0.95) 100%);
            border: 2px solid var(--water-glow);
            box-shadow: inset 0 0 40px rgba(6, 182, 212, 0.15);
        }

        .flip-card.flipped .flip-card-front {
            pointer-events: none;
        }

        .flip-card:not(.flipped) .flip-card-back {
            pointer-events: none;
        }

        /* --- Input Fields (LED display style) --- */
        .eng-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--bp-grid);
            border-bottom: 3px solid var(--water-pure);
            color: var(--water-glow);
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            transition: all 0.2s ease;
            padding: 0;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .eng-input {
            width: 30px;
            height: 40px;
        }

        @media (min-width: 400px) {
            .eng-input {
                width: 34px;
                height: 44px;
                font-size: 1.75rem;
            }
        }

        @media (min-width: 640px) {
            .eng-input {
                width: 40px;
                height: 50px;
                font-size: 2rem;
            }
        }

        .eng-input:focus {
            outline: none;
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--water-glow);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
            color: #fff;
        }

        /* --- Animations & Utilities --- */
        @keyframes shakeError {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-4px);
            }

            40%,
            80% {
                transform: translateX(4px);
            }
        }

        .shake-error {
            animation: shakeError 0.4s ease-in-out;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--water-pure);
            border-radius: 3px;
        }

        /* Buttons */
        .btn-eng {
            background: transparent;
            color: var(--eng-gray);
            border: 2px solid var(--water-pure);
            transition: all 0.2s;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-eng::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--water-pure);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .btn-eng:hover::before {
            left: 0;
        }

        .btn-eng:hover {
            color: var(--bp-dark);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .btn-eng:active {
            transform: scale(0.98);
        }

        .btn-eng:disabled {
            border-color: #475569;
            color: #475569;
            cursor: not-allowed;
        }

        .btn-eng:disabled::before {
            display: none;
        }

        .btn-eng-yellow {
            background: transparent;
            color: var(--eng-yellow);
            border: 2px solid var(--eng-yellow);
            transition: all 0.2s;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
        }

        .btn-eng-yellow:hover {
            background: rgba(234, 179, 8, 0.1);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }

        .highlighter {
            position: relative;
            z-index: 1;
            font-weight: 800;
            color: var(--water-glow);
            background: rgba(6, 182, 212, 0.15);
            padding: 2px 6px;
            border-radius: 2px;
            border: 1px solid var(--water-pure);
        }

        /* Water Flow Seal (SYSTEM ONLINE) */
        .stamp-system {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--water-glow);
            border: 2px solid var(--water-glow);
            padding: 8px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            transform: rotate(5deg);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            border-radius: 4px;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .flipped .stamp-system {
            animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
            animation-delay: 0.3s;
        }

        @keyframes stampIn {
            0% {
                transform: scale(1.5) rotate(15deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(5deg);
                opacity: 1;
            }
        }

        /* Water Pipeline Progress */
        .water-pipeline {
            background-color: var(--bp-grid);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #334155;
            /* Slate 700 */
            height: 12px;
            position: relative;
        }

        .water-flow {
            background: linear-gradient(90deg, #0891b2, var(--water-glow));
            height: 100%;
            transition: width 0.6s ease-out;
            position: relative;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        /* Bubble effect in pipe */
        .water-flow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            background-size: 200% 100%;
            animation: flowBubble 2s linear infinite;
        }

        @keyframes flowBubble {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }
    </style>
</head>

    <script>
        // Data containing exact grammar fixes for blank filling
        const flashcards = [
            { word: "expertise", type: "noun", phonetic: "/ˌekspɜːrˈtiːz/", mean: "chuyên môn, kiến thức chuyên sâu", ex: "The project benefits from the _______ of engineers who have many years of experience in water management." },
            { word: "specialist", type: "noun", phonetic: "/ˈspeʃəlɪst/", mean: "chuyên gia", ex: "A _______ provides advice on how to improve water quality in rural communities." },
            { word: "abandoned wells", type: "noun phrase", phonetic: "/əˈbændənd welz/", mean: "các giếng bị bỏ hoang", ex: "Some villages restore _______ to increase access to clean water." },
            { word: "scheme", type: "noun", phonetic: "/skiːm/", mean: "kế hoạch, dự án", ex: "The new _______ aims to provide safe drinking water for remote areas." },
            { word: "plan", type: "noun", phonetic: "/plæn/", mean: "kế hoạch", ex: "The committee develops a detailed _______ to improve local infrastructure." },
            { word: "repair", type: "verb", phonetic: "/rɪˈper/", mean: "sửa chữa", ex: "Skilled workers _______ damaged equipment to ensure a stable water supply." },
            { word: "fix", type: "verb", phonetic: "/fɪks/", mean: "sửa chữa, khắc phục", ex: "Technicians _______ the broken pump before the rainy season arrives." },
            { word: "available", type: "adjective", phonetic: "/əˈveɪləbl/", mean: "có sẵn, khả dụng", ex: "Clean water is _______ to most households in the community." },
            { word: "non-profit", type: "adjective", phonetic: "/ˌnɒn ˈprɒfɪt/", mean: "phi lợi nhuận", ex: "A _______ organization supports educational and environmental projects in rural areas." },
            { word: "tackle", type: "verb", phonetic: "/ˈtækl/", mean: "giải quyết, xử lý", ex: "Local leaders _______ water shortages through cooperation and careful planning." },
            { word: "approach", type: "noun", phonetic: "/əˈprəʊtʃ/", mean: "phương pháp, cách tiếp cận", ex: "This _______ helps communities manage resources more effectively." },
            { word: "dam", type: "noun", phonetic: "/dæm/", mean: "đập nước", ex: "The _______ stores water and reduces the impact of drought in nearby regions." },
            { word: "capture", type: "verb", phonetic: "/ˈkæptʃər/", mean: "thu giữ, thu gom", ex: "New systems _______ rainwater and store it for future use." },
            { word: "filter", type: "verb", phonetic: "/ˈfɪltər/", mean: "lọc", ex: "We use modern equipment to _______ water before it reaches local households." },
            { word: "otherwise", type: "adverb", phonetic: "/ˈʌðərwaɪz/", mean: "nếu không thì; bằng không", ex: "People need to conserve water; _______, shortages may become more serious." },
            { word: "drain away", type: "phrasal verb", phonetic: "/dreɪn əˈweɪ/", mean: "chảy đi, thoát đi", ex: "Rainwater can _______ quickly if there is no storage system in place." },
            { word: "innovation", type: "noun", phonetic: "/ˌɪnəˈveɪʃən/", mean: "sự đổi mới, sáng tạo", ex: "Technological _______ plays an important role in solving environmental problems." },
            { word: "solution", type: "noun", phonetic: "/səˈluːʃən/", mean: "giải pháp", ex: "Experts search for a long-term _______ to water scarcity in dry regions." },
            { word: "committee", type: "noun", phonetic: "/kəˈmɪti/", mean: "ủy ban, ban điều hành", ex: "The _______ discusses several proposals before making a final decision." },
            { word: "sanitation", type: "noun", phonetic: "/ˌsænɪˈteɪʃən/", mean: "vệ sinh môi trường, điều kiện vệ sinh", ex: "Good _______ helps improve public health and quality of life." },
            { word: "terrace", type: "noun", phonetic: "/ˈterəs/", mean: "ruộng bậc thang; sân hiên", ex: "Each _______ on the hillside helps farmers grow crops effectively." },
            { word: "dig", type: "verb", phonetic: "/dɪɡ/", mean: "đào", ex: "Workers _______ a deep hole before construction begins." },
            { word: "drilling machinery", type: "noun phrase", phonetic: "/ˈdrɪlɪŋ məˈʃiːnəri/", mean: "máy móc khoan", ex: "The project uses _______ to reach underground water sources." },
            { word: "pump", type: "noun", phonetic: "/pʌmp/", mean: "máy bơm", ex: "A powerful _______ moves water from the reservoir to nearby villages." },
            { word: "install", type: "verb", phonetic: "/ɪnˈstɔːl/", mean: "lắp đặt", ex: "Technicians _______ new equipment to improve the efficiency of the system." },
            { word: "reservoir", type: "noun", phonetic: "/ˈrezərvwɑːr/", mean: "hồ chứa nước", ex: "The _______ provides water for thousands of households during dry periods." },
            { word: "gravity", type: "noun", phonetic: "/ˈɡrævəti/", mean: "trọng lực", ex: "The system relies on _______ to move water through the network of pipes." },
            { word: "pipe", type: "noun", phonetic: "/paɪp/", mean: "đường ống", ex: "Water travels through an underground _______ before reaching the house." },
            { word: "concrete", type: "noun/adjective", phonetic: "/ˈkɒŋkriːt/", mean: "bê tông", ex: "Workers use _______ to build strong and durable structures." },
            { word: "structure", type: "noun", phonetic: "/ˈstrʌktʃər/", mean: "công trình, cấu trúc", ex: "The _______ remains stable even during periods of heavy rain." },
            { word: "trench", type: "noun", phonetic: "/trentʃ/", mean: "rãnh, hào đào", ex: "Workers dig a _______ to place new pipes beneath the road." }
        ];

        let currentIndex = 0;
        let hintedWords = new Set();
        let hintUsedThisCard = false;
        let startTime = null;
        let timerId = null;
        let isMusicPlaying = false;
        let currentFallbackAudio = null;
        let isTransitioning = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bgMusic = new Audio('https://cdn.pixabay.com/download/audio/2022/11/06/audio_496ec8c91d.mp3?filename=ambient-drone-space-124982.mp3'); // Deep space/engineering drone
        bgMusic.loop = true; bgMusic.volume = 0.2;

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            const playTone = (oscType, freq1, freq2, vol, dur) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = oscType;
                osc.frequency.setValueAtTime(freq1, now);
                if (freq1 !== freq2) {
                    osc.frequency.exponentialRampToValueAtTime(freq2, now + dur);
                }
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
                osc.start(now); osc.stop(now + dur);
            };

            if (type === 'start') {
                playTone('square', 200, 400, 0.05, 0.5); // System boot
            } else if (type === 'success') {
                playTone('sine', 800, 1200, 0.1, 0.15); // Digital confirm
                setTimeout(() => playTone('sine', 1200, 1600, 0.1, 0.2), 100);
            } else if (type === 'error') {
                playTone('sawtooth', 100, 50, 0.05, 0.3); // Metallic clank/error
            } else if (type === 'flip') {
                playTone('triangle', 300, 150, 0.03, 0.2); // Mechanical slide
            }
        }

        function populateWelcomeTable() {
            const tbody = document.getElementById('welcome-table-body');
            tbody.innerHTML = flashcards.map(item => `
                <tr class="hover:bg-slate-700/50 transition-colors">
                    <td class="p-3 font-tech text-[var(--water-pure)]">${item.word}</td>
                    <td class="p-3 text-center"><span class="px-2 py-1 bg-slate-800 text-slate-300 border border-slate-600 text-xs font-bold rounded uppercase">${item.type}</span></td>
                    <td class="p-3 text-slate-300 text-sm">${item.mean}</td>
                </tr>
            `).join('');
        }

        function startStudy() {
            playSound('start');
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            startTimer();
            renderCard();
        }

        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (isMusicPlaying) { bgMusic.pause(); icon.textContent = '🔇'; }
            else { bgMusic.play().catch(e => console.log(e)); icon.textContent = '🎵'; }
            isMusicPlaying = !isMusicPlaying;
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            startTime = Date.now();
            timerId = setInterval(() => {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').textContent = `${m}:${s}`;
            }, 1000);
        }

        function speakCurrentWord(e) {
            if (e) e.stopPropagation();
            window.speechSynthesis.cancel();
            if (currentFallbackAudio) {
                currentFallbackAudio.pause(); currentFallbackAudio.currentTime = 0;
            }
            const word = flashcards[currentIndex].word.replace(/[\s-]/g, ' ');
            currentFallbackAudio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`);
            currentFallbackAudio.play().catch(() => {
                const utter = new SpeechSynthesisUtterance(word);
                utter.lang = 'en-US'; utter.rate = 0.9;
                window.speechSynthesis.speak(utter);
            });
        }

        function renderCard() {
            const card = flashcards[currentIndex];
            hintUsedThisCard = false;
            document.getElementById('hint-btn').disabled = false;

            document.getElementById('word-mean').textContent = card.mean;
            document.getElementById('word-type').textContent = card.type;

            let wordLength = card.word.replace(/[\s-]/g, '').length;
            let underlineWidth = wordLength < 10 ? 'w-24' : (wordLength < 15 ? 'w-32' : 'w-48');

            let displayEx = card.ex;
            if (displayEx.startsWith("_______")) {
                displayEx = `<span class="border-b-2 border-slate-500 inline-block ${underlineWidth} mx-1 align-text-bottom"></span>` + displayEx.substring(7);
            } else {
                displayEx = displayEx.replace('_______', `<span class="border-b-2 border-slate-500 inline-block ${underlineWidth} mx-1 align-text-bottom"></span>`);
            }
            document.getElementById('word-ex').innerHTML = displayEx;

            const container = document.getElementById('letter-inputs-container');
            container.innerHTML = '';

            const words = card.word.split(' ');
            words.forEach((w, wordIndex) => {
                const group = document.createElement('div');
                group.className = 'flex gap-1';

                w.split('').forEach((char, i) => {
                    if (char === '-') {
                        const dash = document.createElement('span');
                        dash.textContent = '-';
                        dash.className = 'text-xl font-tech text-slate-400 self-center px-1';
                        group.appendChild(dash);
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text'; input.maxLength = 1;
                        input.className = 'eng-input editable-input';

                        input.addEventListener('input', function () {
                            this.value = this.value.toUpperCase();
                            this.classList.remove('bg-red-900/50', 'text-red-400', 'border-red-500');

                            const inputs = Array.from(document.querySelectorAll('.editable-input'));
                            const idx = inputs.indexOf(this);
                            if (this.value && idx < inputs.length - 1) {
                                let next = idx + 1;
                                while (next < inputs.length && inputs[next].readOnly) next++;
                                if (next < inputs.length) inputs[next].focus();
                            }
                        });

                        input.addEventListener('keydown', function (e) {
                            const inputs = Array.from(document.querySelectorAll('.editable-input'));
                            const idx = inputs.indexOf(this);
                            if (e.key === 'Backspace' && !this.value && idx > 0) {
                                let prev = idx - 1;
                                while (prev >= 0 && inputs[prev].readOnly) prev--;
                                if (prev >= 0) { inputs[prev].focus(); inputs[prev].value = ''; }
                            }
                        });
                        group.appendChild(input);
                    }
                });

                container.appendChild(group);
                if (wordIndex < words.length - 1) {
                    const space = document.createElement('div'); space.className = 'w-3 sm:w-5'; container.appendChild(space);
                }
            });

            setTimeout(() => document.querySelector('.editable-input')?.focus(), 150);

            document.getElementById('progress-text').textContent = `${currentIndex + 1}/${flashcards.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / flashcards.length) * 100}%`;

            if (currentIndex === 0) {
                document.getElementById('top-prev-btn').style.display = 'none';
                document.getElementById('top-prev-placeholder').style.display = 'block';
            } else {
                document.getElementById('top-prev-btn').style.display = 'flex';
                document.getElementById('top-prev-placeholder').style.display = 'none';
            }
        }

        function giveHint() {
            if (hintUsedThisCard) return;
            const target = flashcards[currentIndex].word.replace(/[\s-]/g, '').toUpperCase();
            const inputs = document.querySelectorAll('.eng-input');
            let pool = [];
            for (let i = 0; i < inputs.length; i++) if (!inputs[i].readOnly && inputs[i].value.toUpperCase() !== target[i]) pool.push(i);

            if (pool.length === 0) return;

            const count = target.length <= 8 ? 2 : (target.length >= 15 ? 4 : 3);

            for (let i = 0; i < Math.min(count, pool.length); i++) {
                const rand = Math.floor(Math.random() * pool.length);
                const idx = pool.splice(rand, 1)[0];
                inputs[idx].value = target[idx];
                inputs[idx].readOnly = true;
                inputs[idx].classList.add('bg-[var(--eng-yellow)]', 'text-[var(--bp-dark)]', 'border-[var(--eng-yellow)]', 'pointer-events-none');
            }
            hintUsedThisCard = true;
            hintedWords.add(flashcards[currentIndex].word);
            document.getElementById('hint-btn').disabled = true;
        }

        function checkAnswer() {
            if (isTransitioning) return;

            const card = flashcards[currentIndex];
            const target = card.word.replace(/[\s-]/g, '').toUpperCase();
            const inputs = document.querySelectorAll('.eng-input');
            const user = Array.from(inputs).map(i => i.value).join('').toUpperCase();

            if (user === target) {
                playSound('success');
                isTransitioning = true;

                const seal = document.getElementById('result-seal');
                if (hintUsedThisCard) {
                    seal.textContent = "ASSISTED";
                    seal.style.color = "var(--eng-yellow)";
                    seal.style.borderColor = "var(--eng-yellow)";
                    seal.style.boxShadow = "0 0 20px rgba(234, 179, 8, 0.2)";
                } else {
                    seal.textContent = "SYSTEM ONLINE";
                    seal.style.color = "var(--water-glow)";
                    seal.style.borderColor = "var(--water-glow)";
                    seal.style.boxShadow = "0 0 20px rgba(6, 182, 212, 0.2)";
                }

                document.getElementById('back-word').textContent = card.word;
                document.getElementById('back-phonetic').textContent = card.phonetic;
                document.getElementById('back-mean').textContent = card.mean;

                let backExStr = card.ex;
                if (backExStr.startsWith("_______")) {
                    let capitalizedWord = card.word.charAt(0).toUpperCase() + card.word.slice(1);
                    backExStr = backExStr.replace('_______', `<span class="highlighter">${capitalizedWord}</span>`);
                } else {
                    backExStr = backExStr.replace('_______', `<span class="highlighter">${card.word}</span>`);
                }
                document.getElementById('back-ex').innerHTML = backExStr;

                document.getElementById('flashcard').classList.add('flipped');
                setTimeout(() => { document.getElementById('next-btn').focus(); isTransitioning = false; }, 700);
            } else {
                playSound('error');
                const container = document.getElementById('letter-inputs-container');
                container.classList.add('shake-error');
                setTimeout(() => container.classList.remove('shake-error'), 400);

                inputs.forEach((input, idx) => {
                    if (!input.readOnly && input.value && input.value.toUpperCase() !== target[idx]) {
                        input.classList.add('bg-red-900/50', 'text-red-400', 'border-red-500');
                    }
                });
            }
        }

        function nextCard() {
            if (isTransitioning) return;
            isTransitioning = true; playSound('flip');
            document.getElementById('flashcard').classList.remove('flipped');
            setTimeout(() => {
                if (currentIndex < flashcards.length - 1) { currentIndex++; renderCard(); }
                else showFinal();
                isTransitioning = false;
            }, 600);
        }

        function prevCard() {
            if (isTransitioning) return;
            isTransitioning = true; playSound('flip');
            document.getElementById('flashcard').classList.remove('flipped');
            setTimeout(() => {
                if (currentIndex > 0) { currentIndex--; renderCard(); }
                isTransitioning = false;
            }, 600);
        }

        function showFinal() {
            clearInterval(timerId);
            const totalSec = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(totalSec / 60); const s = totalSec % 60;

            const totalWords = flashcards.length;
            const correctWords = totalWords - hintedWords.size;
            const scorePercentage = Math.round((correctWords / totalWords) * 100);

            document.getElementById('main-content').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';

            const now = new Date();
            const dateString = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
            document.getElementById('completion-datetime').textContent = `LOG DATE: ${dateString}`;

            const scoreEl = document.getElementById('score-percent');
            scoreEl.textContent = `${scorePercentage}%`;
            if (scorePercentage < 100) scoreEl.style.color = "var(--eng-yellow)";

            document.getElementById('elapsed-time').textContent = (m > 0 ? `${m}m ` : '') + `${s}s`;
            document.getElementById('correct-count').textContent = `${correctWords}/${totalWords}`;
            document.getElementById('hint-count').textContent = hintedWords.size;

            const tbody = document.getElementById('final-review-table-body');
            tbody.innerHTML = flashcards.map(item => {
                const usedHint = hintedWords.has(item.word);
                const statusIcon = usedHint
                    ? '<span class="text-[var(--eng-yellow)] border border-[var(--eng-yellow)] px-2 py-1 rounded text-xs font-bold uppercase">Assisted</span>'
                    : '<span class="text-green-400 border border-green-500 px-2 py-1 rounded text-xs font-bold uppercase">Optimal</span>';

                return `
                    <tr class="hover:bg-slate-700/50 transition-colors">
                        <td class="p-3 text-center border-r border-slate-700/50">${statusIcon}</td>
                        <td class="p-3 font-tech font-bold text-[var(--water-pure)] border-r border-slate-700/50">${item.word}</td>
                        <td class="p-3 text-slate-300 text-sm">${item.mean}</td>
                    </tr>
                `;
            }).join('');
        }

        function resetQuizToSummary() {
            currentIndex = 0; hintedWords.clear();
            document.getElementById('final-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
            populateWelcomeTable();
            document.querySelector('#welcome-screen .overflow-auto').scrollTop = 0;
        }

        document.addEventListener('DOMContentLoaded', () => { populateWelcomeTable(); });

        document.addEventListener('keydown', e => {
            if (document.getElementById('main-content').style.display === 'none') return;
            if (e.altKey && e.key.toLowerCase() === 'h') { e.preventDefault(); giveHint(); }
            if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); speakCurrentWord(); }
            if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
                e.preventDefault();
                if (isTransitioning) return;
                if (document.getElementById('flashcard').classList.contains('flipped')) nextCard();
                else checkAnswer();
            }
        });
    </script>
</body>

</html>
