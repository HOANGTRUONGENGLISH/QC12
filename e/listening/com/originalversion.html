<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Space Dictation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030014;
            /* Deep space fallback */
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Dark Mode Diff Styling */
        .diff-added {
            color: #4ade80;
            /* emerald-400 */
            font-weight: 600;
            background-color: rgba(52, 211, 153, 0.15);
            padding: 0 4px;
            border-radius: 6px;
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.3);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .diff-removed {
            color: #f43f5e;
            /* rose-500 */
            text-decoration: line-through;
            background-color: rgba(244, 63, 94, 0.15);
            padding: 0 4px;
            border-radius: 6px;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .diff-correct {
            color: #cbd5e1;
            /* slate-300 */
        }

        /* Premium Dark Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Text Gradient Utility */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Validation Animations */
        @keyframes shake-input {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .error-shake {
            animation: shake-input 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: rgba(244, 63, 94, 0.8) !important;
            /* rose-500 */
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.4) !important;
            color: #fca5a5 !important;
            /* text-rose-300 */
            background-color: rgba(244, 63, 94, 0.1) !important;
        }

        .correct-glow {
            border-color: rgba(52, 211, 153, 0.8) !important;
            /* emerald-400 */
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.2) !important;
            color: #6ee7b7 !important;
            /* text-emerald-300 */
            background-color: rgba(52, 211, 153, 0.05) !important;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col antialiased relative">

    <!-- Canvas Space Background -->
    <canvas id="space-bg" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- Header -->
    <header class="bg-[#030014]/60 backdrop-blur-2xl border-b border-white/10 shadow-lg py-4 px-6 sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1
                class="text-2xl font-extrabold flex items-center gap-3 bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-400 text-gradient drop-shadow-sm">
                <i class="fa-solid fa-satellite-dish text-indigo-400"></i> DICTATION
            </h1>
            <div class="flex items-center gap-4">
                <div
                    class="text-sm font-semibold bg-white/5 border border-white/10 py-1.5 px-4 rounded-full shadow-[0_0_15px_rgba(129,140,248,0.15)] backdrop-blur-md text-indigo-200">
                    Signal: <span id="current-sentence-indicator" class="text-white font-bold ml-1">1/5</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col gap-6 relative z-10">

        <!-- Controls Section -->
        <div id="main-panel"
            class="bg-[#0b1021]/70 backdrop-blur-3xl rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.6)] border border-indigo-500/20 p-6 sm:p-8 relative overflow-hidden transition-all duration-500">
            <!-- Decorative interior glows -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-600/10 rounded-full blur-[80px] pointer-events-none">
            </div>
            <div
                class="absolute bottom-0 left-0 w-48 h-48 bg-purple-600/10 rounded-full blur-[60px] pointer-events-none">
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 relative z-10">
                <h2 class="text-xl font-bold text-indigo-200 tracking-wide uppercase text-sm flex items-center gap-2">
                    <i class="fa-solid fa-book-open"></i> Lesson: Common Idioms 1
                </h2>

                <!-- Audio Controls -->
                <div class="flex items-center gap-4 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                    <button id="btn-slow"
                        class="text-indigo-400 hover:text-white hover:bg-white/5 p-2 rounded-xl transition-all duration-300 flex flex-col items-center justify-center w-12 h-12"
                        title="Slow">
                        <i class="fa-solid fa-snail"></i>
                        <span class="text-[10px] font-semibold mt-0.5 opacity-80">Slow</span>
                    </button>
                    <button id="btn-play"
                        class="bg-gradient-to-tr from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white p-3 rounded-xl shadow-[0_0_20px_rgba(99,102,241,0.5)] transition-all transform hover:scale-105 flex items-center justify-center w-14 h-14"
                        title="Play audio">
                        <i class="fa-solid fa-play text-xl ml-1"></i>
                    </button>
                    <button id="btn-normal"
                        class="text-white bg-indigo-500/30 ring-1 ring-indigo-400/50 p-2 rounded-xl transition-all duration-300 flex flex-col items-center justify-center w-12 h-12 shadow-[inset_0_0_10px_rgba(255,255,255,0.1)]"
                        title="Normal">
                        <i class="fa-solid fa-person-running"></i>
                        <span class="text-[10px] font-semibold mt-0.5 opacity-80">Normal</span>
                    </button>
                </div>
            </div>

            <!-- Progress Bar -->
            <div
                class="w-full bg-[#050510] border border-white/10 rounded-full h-3.5 mb-8 shadow-inner relative z-10 overflow-hidden">
                <div id="progress-bar"
                    class="bg-gradient-to-r from-cyan-500 via-indigo-500 to-purple-500 h-full rounded-full transition-all duration-500 shadow-[0_0_15px_rgba(139,92,246,0.6)] relative"
                    style="width: 20%">
                    <!-- Shiny highlight on progress bar -->
                    <div
                        class="absolute top-0 right-0 bottom-0 w-8 bg-gradient-to-r from-transparent to-white/40 blur-[2px]">
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="relative z-10">
                <!-- Word Inputs Container (Dark Glassmorphism Style) -->
                <div id="word-inputs-container"
                    class="flex flex-wrap gap-x-3.5 gap-y-6 p-8 bg-[#050814]/50 backdrop-blur-xl border border-indigo-500/30 shadow-[inset_0_0_40px_rgba(79,70,229,0.05),0_10px_30px_rgba(0,0,0,0.4)] rounded-3xl min-h-[14rem] items-start content-start transition-all">
                    <!-- Word inputs will be generated here -->
                </div>

                <!-- Feedback/Diff Display (Hidden initially) -->
                <div id="feedback-area"
                    class="hidden w-full p-8 border border-indigo-400/30 bg-[#0a0f25]/80 backdrop-blur-xl rounded-3xl text-lg min-h-[14rem] leading-relaxed shadow-[inset_0_0_30px_rgba(0,0,0,0.5)]">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-between items-center mt-8 relative z-10">
                <button id="btn-show-answer"
                    class="text-indigo-400 hover:text-cyan-300 font-medium px-4 py-2 rounded-xl transition-all flex items-center gap-2 hover:bg-white/5 border border-transparent hover:border-white/10">
                    <i class="fa-regular fa-eye"></i> Decrypt Answer
                </button>

                <div class="flex gap-4">
                    <button id="btn-back"
                        class="bg-white/5 border border-white/10 text-slate-300 font-semibold py-3 px-6 rounded-xl transition-all duration-300 flex items-center gap-2 shadow-lg backdrop-blur-md">
                        <i class="fa-solid fa-arrow-left"></i> Back
                    </button>
                    <button id="btn-check"
                        class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 px-8 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] transform hover:-translate-y-0.5 tracking-wide">
                        <i class="fa-solid fa-check-double"></i> Verify
                    </button>
                    <button id="btn-next"
                        class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-8 rounded-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all duration-300 flex items-center gap-2 hidden hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] transform hover:-translate-y-0.5 tracking-wide">
                        Next Signal <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Summary (Hidden initially) -->
        <div id="result-summary"
            class="hidden bg-[#0b1021]/80 backdrop-blur-3xl rounded-3xl shadow-[0_0_60px_rgba(99,102,241,0.2)] border border-indigo-500/30 p-10 sm:p-14 text-center relative overflow-hidden w-full max-w-4xl mx-auto">
            <!-- Decorative galaxy flare in summary -->
            <div
                class="absolute top-0 left-1/2 -translate-x-1/2 w-[30rem] h-[30rem] bg-indigo-500/10 rounded-full blur-[100px] -z-10 pointer-events-none">
            </div>

            <h2
                class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-400 mb-3 drop-shadow-sm">
                Mission Completed!</h2>
            <p id="completion-date"
                class="text-indigo-300/80 mb-10 text-sm font-bold tracking-widest uppercase flex items-center justify-center gap-2">
            </p>

            <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6 mb-10">
                <div
                    class="text-center bg-black/40 p-6 rounded-3xl border border-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.03)] backdrop-blur-md flex-1">
                    <div class="text-5xl font-black text-emerald-400 drop-shadow-[0_0_20px_rgba(52,211,153,0.5)]"
                        id="score-display">0/5</div>
                    <div class="text-xs text-indigo-300 mt-3 font-bold uppercase tracking-widest">Perfect Signals</div>
                </div>
                <div
                    class="text-center bg-black/40 p-6 rounded-3xl border border-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.03)] backdrop-blur-md flex-1">
                    <div class="text-5xl font-black text-cyan-400 drop-shadow-[0_0_20px_rgba(34,211,238,0.5)]"
                        id="accuracy-display">0%</div>
                    <div class="text-xs text-indigo-300 mt-3 font-bold uppercase tracking-widest">Global Accuracy</div>
                </div>
                <div
                    class="text-center bg-black/40 p-6 rounded-3xl border border-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.03)] backdrop-blur-md flex-1">
                    <div class="text-5xl font-black text-purple-400 drop-shadow-[0_0_20px_rgba(192,132,252,0.5)]"
                        id="hints-display">0/5</div>
                    <div class="text-xs text-indigo-300 mt-3 font-bold uppercase tracking-widest">Sentences w/ Hints
                    </div>
                </div>
            </div>

            <!-- Hint Details Box -->
            <div id="hints-details-container"
                class="bg-black/30 border border-white/5 rounded-2xl p-6 mb-10 text-left max-h-[16rem] overflow-y-auto hidden shadow-inner">
                <h3
                    class="text-lg font-bold text-indigo-200 mb-4 flex items-center gap-2 border-b border-white/10 pb-3">
                    <i class="fa-solid fa-magnifying-glass"></i> Hint Analysis</h3>
                <ul id="hints-list" class="space-y-3">
                    <!-- Populated by JS -->
                </ul>
            </div>

            <button id="btn-restart"
                class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-4 px-10 rounded-2xl shadow-[0_0_30px_rgba(219,39,119,0.4)] transition-all duration-300 inline-flex items-center gap-3 hover:scale-105 tracking-wide text-lg">
                <i class="fa-solid fa-rocket"></i> Restart Journey
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer
        class="text-indigo-400/50 py-6 text-center mt-auto backdrop-blur-sm bg-[#030014]/60 border-t border-white/5 relative z-10 font-medium text-sm">
        <p>© Copyright 2026 by Hoang Truong English</p>
    </footer>

    <script>
        // --- Data ---
        const sentences = [
            "I think David hit the nail on the head when he said that kids won't want to buy this product.",
            "If I joined a singing contest, I would practise every day. If I stood on the stage and saw many people, I might get cold feet.",
            "If I woke up early and felt tired, I might have a headache. If I skipped school or work, I would probably feel under the weather.",
            "If I entered a dark room and heard a strange noise, I would hold a flashlight tightly. I would get cold feet and want to run away.",
            "If I prepared my lessons well, I could answer questions quickly and be on the ball."
        ];

        const translations = [
            "Tôi nghĩ David đã nói đúng trọng tâm khi cậu ấy cho rằng bọn trẻ sẽ không muốn mua sản phẩm này.",
            "Nếu tôi tham gia một cuộc thi hát, tôi sẽ luyện tập mỗi ngày. Nếu tôi đứng trên sân khấu và thấy nhiều người, tôi có thể sẽ bị chùn bước (rụt rè).",
            "Nếu tôi thức dậy sớm và cảm thấy mệt mỏi, tôi có thể bị đau đầu. Nếu tôi cúp học hoặc nghỉ làm, có lẽ tôi sẽ cảm thấy không được khỏe.",
            "Nếu tôi bước vào một căn phòng tối và nghe thấy tiếng động lạ, tôi sẽ cầm chặt đèn pin. Tôi sẽ cảm thấy sợ hãi và muốn chạy trốn.",
            "Nếu tôi chuẩn bị bài tốt, tôi có thể trả lời các câu hỏi nhanh chóng và phản ứng nhạy bén."
        ];

        // --- State ---
        let currentIndex = 0;
        let isPlaying = false;
        let currentRate = 1.0; // 1.0 is normal, 0.75 is slow
        let scores = new Array(sentences.length).fill(null);
        let currentSentenceAccuracy = 0;
        let isAnswerChecked = false;

        // --- Audio State ---
        let currentAudio = new Audio();
        let audioCache = {};
        let hintsTracker = new Array(sentences.length).fill(null).map(() => []);

        // --- DOM Elements ---
        const els = {
            currentIndicator: document.getElementById('current-sentence-indicator'),
            progressBar: document.getElementById('progress-bar'),
            btnPlay: document.getElementById('btn-play'),
            btnSlow: document.getElementById('btn-slow'),
            btnNormal: document.getElementById('btn-normal'),
            wordInputsContainer: document.getElementById('word-inputs-container'),
            feedbackArea: document.getElementById('feedback-area'),
            btnCheck: document.getElementById('btn-check'),
            btnBack: document.getElementById('btn-back'),
            btnNext: document.getElementById('btn-next'),
            btnShowAnswer: document.getElementById('btn-show-answer'),
            resultSummary: document.getElementById('result-summary'),
            scoreDisplay: document.getElementById('score-display'),
            accuracyDisplay: document.getElementById('accuracy-display'),
            hintsDisplay: document.getElementById('hints-display'),
            hintsDetailsContainer: document.getElementById('hints-details-container'),
            hintsList: document.getElementById('hints-list'),
            completionDate: document.getElementById('completion-date'),
            btnRestart: document.getElementById('btn-restart'),
            mainPanel: document.getElementById('main-panel')
        };

        // --- Initialization ---
        function init() {
            initSpaceBackground(); // Start canvas animation
            updateUI();
            setupEventListeners();
            renderWordInputs();
        }

        // --- Space Background Canvas Animation ---
        function initSpaceBackground() {
            const canvas = document.getElementById('space-bg');
            const ctx = canvas.getContext('2d');
            let width, height;

            // Elements
            const stars = [];
            const numStars = 350;
            const nebulae = [];
            const colors = [
                'rgba(79, 70, 229, 0.12)',  // Indigo
                'rgba(147, 51, 234, 0.08)', // Purple
                'rgba(14, 165, 233, 0.08)', // Light Blue
                'rgba(236, 72, 153, 0.05)'  // Pink
            ];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // Generate Stars
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.2,
                    speedY: Math.random() * 0.2 + 0.05, // Slow drifting up
                    speedX: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random(),
                    twinkleSpeed: Math.random() * 0.02 + 0.005
                });
            }

            // Generate Nebulae (Glowing Orbs)
            for (let i = 0; i < 4; i++) {
                nebulae.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 400 + 200,
                    color: colors[i],
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4
                });
            }

            function animate() {
                // Clear with deep space color
                ctx.fillStyle = '#02000a';
                ctx.fillRect(0, 0, width, height);

                // Draw moving nebulae
                nebulae.forEach(nebula => {
                    nebula.x += nebula.vx;
                    nebula.y += nebula.vy;

                    // Smooth bounce
                    if (nebula.x < -nebula.radius || nebula.x > width + nebula.radius) nebula.vx *= -1;
                    if (nebula.y < -nebula.radius || nebula.y > height + nebula.radius) nebula.vy *= -1;

                    const gradient = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.radius);
                    gradient.addColorStop(0, nebula.color);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(nebula.x, nebula.y, nebula.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw and update stars
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                    ctx.fill();

                    // Movement
                    star.y -= star.speedY;
                    star.x += star.speedX;

                    // Twinkle
                    star.alpha += star.twinkleSpeed;
                    if (star.alpha > 1 || star.alpha < 0.1) {
                        star.twinkleSpeed *= -1;
                    }

                    // Loop around screen
                    if (star.y < 0) {
                        star.y = height;
                        star.x = Math.random() * width;
                    }
                    if (star.x < 0) star.x = width;
                    if (star.x > width) star.x = 0;
                });

                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- Word Input Logic ---
        function renderWordInputs() {
            els.wordInputsContainer.innerHTML = '';
            const words = sentences[currentIndex].split(/\s+/);

            words.forEach((word, index) => {
                const cleanWord = word.replace(/[.,?!]/g, '');

                const wrapper = document.createElement('div');
                wrapper.className = 'flex flex-col items-center gap-2.5 relative group';

                const input = document.createElement('input');
                input.type = 'text';
                // Dark Space Glass Input
                input.className = 'word-input px-3 py-3 bg-[#ffffff08] backdrop-blur-md border border-white/10 shadow-[0_4px_15px_rgba(0,0,0,0.2)] focus:shadow-[0_0_20px_rgba(168,85,247,0.4)] focus:bg-[#ffffff15] outline-none text-center text-lg font-bold text-white transition-all duration-300 rounded-xl focus:ring-2 focus:ring-purple-400/50 focus:border-purple-400/70 placeholder-white/20';

                input.style.width = `calc(${Math.max(3, cleanWord.length)}ch + 2rem)`;
                input.dataset.index = index;

                input.addEventListener('keydown', handleInputKeydown);
                input.addEventListener('paste', handlePaste);
                input.addEventListener('input', handleInputEvent); // Thêm theo dõi nhập liệu trực tiếp để vượt qua Unikey

                const hintBtn = document.createElement('button');
                // Glowing hint button
                hintBtn.className = 'text-indigo-400 hover:text-cyan-300 bg-white/5 backdrop-blur-sm border border-white/10 shadow-sm hover:bg-white/10 hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all duration-300 focus:outline-none w-7 h-7 flex items-center justify-center rounded-full opacity-50 hover:opacity-100 cursor-pointer transform hover:scale-110';
                hintBtn.title = 'Reveal this word';
                hintBtn.innerHTML = '<i class="fa-solid fa-eye text-[11px]"></i>';

                hintBtn.addEventListener('click', () => {
                    input.value = cleanWord;
                    input.classList.add('text-cyan-300', 'drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]');
                    hintBtn.classList.replace('text-indigo-400', 'text-indigo-800/50');
                    hintBtn.classList.remove('hover:text-cyan-300', 'hover:bg-white/10', 'hover:shadow-[0_0_15px_rgba(34,211,238,0.4)]', 'transform', 'hover:scale-110');
                    hintBtn.disabled = true;

                    // Ghi nhận lịch sử dùng Hint
                    if (!hintsTracker[currentIndex].includes(cleanWord)) {
                        hintsTracker[currentIndex].push(cleanWord);
                    }

                    const allInputs = document.querySelectorAll('.word-input');
                    if (index < allInputs.length - 1) {
                        allInputs[index + 1].focus();
                    }
                });

                wrapper.appendChild(input);
                wrapper.appendChild(hintBtn);
                els.wordInputsContainer.appendChild(wrapper);
            });
        }

        function handleInputKeydown(e) {
            const index = parseInt(e.target.dataset.index);
            const inputs = document.querySelectorAll('.word-input');

            if (e.key === ' ') {
                e.preventDefault();
                if (index < inputs.length - 1) {
                    setTimeout(() => inputs[index + 1].focus(), 15);
                }
            } else if (e.key === 'Backspace' && e.target.value === '') {
                e.preventDefault();
                if (index > 0) {
                    inputs[index - 1].focus();
                    setTimeout(() => {
                        inputs[index - 1].selectionStart = inputs[index - 1].selectionEnd = inputs[index - 1].value.length;
                    }, 0);
                }
            } else if (e.key === 'ArrowRight' && e.target.selectionStart === e.target.value.length) {
                e.preventDefault();
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            } else if (e.key === 'ArrowLeft' && e.target.selectionStart === 0) {
                e.preventDefault();
                if (index > 0) {
                    inputs[index - 1].focus();
                }
            } else if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                checkAnswer();
            } else if (e.key === 'Enter') {
                checkAnswer();
            }
        }

        function handleInputEvent(e) {
            // Hỗ trợ tuyệt đối cho bộ gõ Tiếng Việt và bàn phím Mobile
            // Bất cứ khi nào giá trị có chứa khoảng trắng, lập tức nhảy ô
            const val = e.target.value;
            if (val.includes(' ')) {
                e.target.value = val.replace(/\s+/g, ''); // Xóa bỏ dấu cách thừa đi

                const index = parseInt(e.target.dataset.index);
                const inputs = document.querySelectorAll('.word-input');
                if (index < inputs.length - 1) {
                    // Delay nhỏ (15ms) để bộ gõ (Unikey/Mobile) hoàn tất quá trình 
                    // "chốt" chữ vào ô hiện tại trước khi chuyển focus, 
                    // tránh tình trạng nhân bản chữ sang ô tiếp theo.
                    setTimeout(() => inputs[index + 1].focus(), 15);
                }
            }
        }

        function handlePaste(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const pastedWords = pasteData.trim().split(/\s+/);
            const inputs = document.querySelectorAll('.word-input');
            const startIndex = parseInt(e.target.dataset.index);

            for (let i = 0; i < pastedWords.length; i++) {
                if (startIndex + i < inputs.length) {
                    inputs[startIndex + i].value = pastedWords[i];
                }
            }

            const nextIndex = Math.min(startIndex + pastedWords.length, inputs.length - 1);
            inputs[nextIndex].focus();
        }

        // --- AI Text-To-Speech (Gemini) ---
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pcmToWav(pcm16, sampleRate) {
            const numChannels = 1;
            const byteRate = sampleRate * numChannels * 2;
            const blockAlign = numChannels * 2;
            const dataSize = pcm16.length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < pcm16.length; i++, offset += 2) {
                view.setInt16(offset, pcm16[i], true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function fetchNaturalAudio(text) {
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };
            const apiKey = "";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            const part = result?.candidates?.[0]?.content?.parts?.[0];
            const audioData = part?.inlineData?.data;
            const mimeType = part?.inlineData?.mimeType;

            if (audioData && mimeType && mimeType.startsWith("audio/")) {
                const sampleRateMatch = mimeType.match(/rate=(\d+)/);
                const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;
                const pcmData = base64ToArrayBuffer(audioData);
                const pcm16 = new Int16Array(pcmData);
                const wavBlob = pcmToWav(pcm16, sampleRate);
                return URL.createObjectURL(wavBlob);
            }
            throw new Error("Failed to generate audio from AI");
        }

        async function playAudio() {
            if (isPlaying) {
                stopAudio();
                return;
            }

            const text = sentences[currentIndex];

            els.btnPlay.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i>';
            els.btnPlay.classList.add('opacity-75');

            try {
                if (!audioCache[text]) {
                    audioCache[text] = await fetchNaturalAudio(text);
                }

                currentAudio.src = audioCache[text];
                currentAudio.playbackRate = currentRate;

                currentAudio.onplay = () => {
                    isPlaying = true;
                    els.btnPlay.innerHTML = '<i class="fa-solid fa-stop text-xl"></i>';
                    els.btnPlay.classList.remove('opacity-75');
                    els.btnPlay.classList.replace('from-indigo-600', 'from-pink-600');
                    els.btnPlay.classList.replace('to-purple-600', 'to-rose-600');
                    els.btnPlay.classList.replace('hover:from-indigo-500', 'hover:from-pink-500');
                    els.btnPlay.classList.replace('hover:to-purple-500', 'hover:to-rose-500');
                    els.btnPlay.classList.replace('shadow-[0_0_20px_rgba(99,102,241,0.5)]', 'shadow-[0_0_20px_rgba(225,29,72,0.5)]');
                };

                currentAudio.onended = () => {
                    isPlaying = false;
                    resetPlayButton();
                };

                currentAudio.play();
            } catch (error) {
                console.error("Audio error:", error);
                resetPlayButton();
            }
        }

        function resetPlayButton() {
            els.btnPlay.innerHTML = '<i class="fa-solid fa-play text-xl ml-1"></i>';
            els.btnPlay.classList.remove('opacity-75');
            els.btnPlay.classList.replace('from-pink-600', 'from-indigo-600');
            els.btnPlay.classList.replace('to-rose-600', 'to-purple-600');
            els.btnPlay.classList.replace('hover:from-pink-500', 'hover:from-indigo-500');
            els.btnPlay.classList.replace('hover:to-rose-500', 'hover:to-purple-500');
            els.btnPlay.classList.replace('shadow-[0_0_20px_rgba(225,29,72,0.5)]', 'shadow-[0_0_20px_rgba(99,102,241,0.5)]');
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            isPlaying = false;
            resetPlayButton();
        }

        // --- Diffing Algorithm ---
        function calculateDiff(correctText, userText) {
            const normalize = (text) => text.toLowerCase().replace(/[.,?!]/g, '').trim().split(/\s+/).filter(w => w.length > 0);
            const correctWords = normalize(correctText);
            const userWords = normalize(userText);
            const originalWords = correctText.split(/\s+/);

            let htmlOutput = [];
            let correctCount = 0;
            let i = 0; let j = 0;

            while (i < correctWords.length || j < userWords.length) {
                if (i < correctWords.length && j < userWords.length && correctWords[i] === userWords[j]) {
                    htmlOutput.push(`<span class="diff-correct">${originalWords[i]}</span>`);
                    correctCount++;
                    i++; j++;
                } else if (i < correctWords.length && j < userWords.length) {
                    if (i + 1 < correctWords.length && correctWords[i + 1] === userWords[j]) {
                        htmlOutput.push(`<span class="diff-added" title="Missing word">${originalWords[i]}</span>`);
                        i++;
                    } else if (j + 1 < userWords.length && correctWords[i] === userWords[j + 1]) {
                        htmlOutput.push(`<span class="diff-removed" title="Extra word">${userWords[j]}</span>`);
                        j++;
                    } else {
                        htmlOutput.push(`<span class="diff-removed" title="Wrong word">${userWords[j] || ''}</span> <span class="diff-added" title="Correct word">${originalWords[i]}</span>`);
                        i++; j++;
                    }
                } else if (i < correctWords.length) {
                    htmlOutput.push(`<span class="diff-added" title="Missing word">${originalWords[i]}</span>`);
                    i++;
                } else if (j < userWords.length) {
                    htmlOutput.push(`<span class="diff-removed" title="Extra word">${userWords[j]}</span>`);
                    j++;
                }
            }

            const accuracy = correctWords.length > 0 ? (correctCount / correctWords.length) * 100 : 0;
            return {
                html: htmlOutput.join(' '),
                accuracy: Math.min(100, Math.round(accuracy)),
                isPerfect: accuracy === 100
            };
        }


        // --- Event Handlers & Logic ---
        function checkAnswer() {
            if (isAnswerChecked) return;
            stopAudio();

            const inputs = document.querySelectorAll('.word-input');
            const userWords = Array.from(inputs).map(inp => inp.value.trim());
            const userInput = userWords.join(' ').trim();
            const correctSentence = sentences[currentIndex];
            const correctWordsArray = correctSentence.split(/\s+/).map(w => w.replace(/[.,?!]/g, '').toLowerCase());

            if (userWords.every(w => w === "")) {
                inputs[0].focus();
                els.wordInputsContainer.classList.add('border-rose-500/50', 'bg-rose-950/20');
                setTimeout(() => els.wordInputsContainer.classList.remove('border-rose-500/50', 'bg-rose-950/20'), 500);
                return;
            }

            let hasError = false;
            inputs.forEach((input, idx) => {
                const uVal = input.value.trim().toLowerCase();
                const cVal = correctWordsArray[idx];

                input.classList.remove('error-shake', 'correct-glow');

                if (uVal !== cVal) {
                    hasError = true;
                    void input.offsetWidth; // trigger reflow to restart animation
                    input.classList.add('error-shake');
                } else {
                    input.classList.add('correct-glow');
                }
            });

            const diffResult = calculateDiff(correctSentence, userInput);
            currentSentenceAccuracy = diffResult.accuracy;

            const finalizeFeedback = () => {
                els.wordInputsContainer.classList.add('hidden');
                els.feedbackArea.classList.remove('hidden');

                let feedbackHtml = `
                    <div class="mb-6 flex items-center gap-3">
                        <span class="font-semibold text-indigo-300 uppercase tracking-widest text-sm">Analysis Result:</span> 
                        <span class="px-3 py-1 rounded-full text-sm font-bold bg-white/5 border ${diffResult.isPerfect ? 'border-emerald-500/50 text-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.3)]' : (diffResult.accuracy > 70 ? 'border-blue-500/50 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'border-rose-500/50 text-rose-400 shadow-[0_0_15px_rgba(244,63,94,0.3)]')}">${diffResult.accuracy}% Accuracy</span>
                    </div>
                    <div class="leading-loose text-slate-200 text-xl font-medium tracking-wide">${diffResult.html}</div>
                `;

                if (diffResult.isPerfect) {
                    feedbackHtml = `
                        <div class="text-emerald-400 font-bold mb-5 flex items-center gap-3 text-2xl drop-shadow-[0_0_10px_rgba(52,211,153,0.5)]">
                            <i class="fa-solid fa-circle-check"></i> Perfect Decryption!
                        </div>
                        <div class="text-slate-200 text-xl font-medium tracking-wide bg-white/5 p-5 rounded-2xl border border-white/5 shadow-inner mb-5">${correctSentence}</div>
                        <div class="text-emerald-200/80 text-lg italic border-l-4 border-emerald-500/50 pl-4 py-2 bg-emerald-900/10 rounded-r-xl">${translations[currentIndex]}</div>
                    `;
                } else {
                    feedbackHtml += `
                        <div class="mt-8 pt-6 border-t border-indigo-500/20 relative">
                            <div class="absolute -top-3 left-6 bg-[#0a0f25] px-3 text-xs font-bold text-indigo-400 uppercase tracking-widest rounded">Original Signal</div>
                            <div class="text-slate-300 text-xl font-medium mt-2 p-5 bg-white/5 rounded-2xl border border-white/5 leading-relaxed shadow-inner mb-5">${correctSentence}</div>
                            <div class="text-indigo-300/80 text-lg italic border-l-4 border-indigo-500/50 pl-4 py-2 bg-indigo-900/10 rounded-r-xl">${translations[currentIndex]}</div>
                        </div>
                    `;
                }

                els.feedbackArea.innerHTML = feedbackHtml;

                scores[currentIndex] = {
                    accuracy: diffResult.accuracy,
                    isPerfect: diffResult.isPerfect
                };
                isAnswerChecked = true;

                els.btnCheck.classList.add('hidden');
                els.btnShowAnswer.classList.add('hidden');
                els.btnNext.classList.remove('hidden');

                if (currentIndex === sentences.length - 1) {
                    els.btnNext.innerHTML = 'Complete Mission <i class="fa-solid fa-flag-checkered"></i>';
                }
            };

            // Nếu có lỗi, delay lại 0.8s để người dùng kịp nhìn thấy hiệu ứng rung viền đỏ
            if (hasError) {
                els.btnCheck.disabled = true;
                els.btnShowAnswer.disabled = true;
                setTimeout(() => {
                    els.btnCheck.disabled = false;
                    els.btnShowAnswer.disabled = false;

                    let firstWrong = null;
                    inputs.forEach((input, idx) => {
                        const uVal = input.value.trim().toLowerCase();
                        const cVal = correctWordsArray[idx];
                        if (uVal !== cVal) {
                            input.value = ''; // Xoá chữ sai
                            input.classList.remove('error-shake'); // Trả lại trạng thái bình thường
                            if (!firstWrong) firstWrong = input;
                        }
                    });

                    // Focus vào ô sai đầu tiên để bắt buộc gõ lại
                    if (firstWrong) firstWrong.focus();
                }, 800);
            } else {
                finalizeFeedback();
            }
        }

        function showAnswer() {
            if (isAnswerChecked) return;
            stopAudio();

            const inputs = document.querySelectorAll('.word-input');
            const correctWordsArray = sentences[currentIndex].split(/\s+/).map(w => w.replace(/[.,?!]/g, '').toLowerCase());

            let hasError = false;
            inputs.forEach((input, idx) => {
                const uVal = input.value.trim().toLowerCase();
                const cVal = correctWordsArray[idx];

                input.classList.remove('error-shake', 'correct-glow');

                if (uVal !== cVal) {
                    hasError = true;
                    void input.offsetWidth;
                    input.classList.add('error-shake');
                } else {
                    input.classList.add('correct-glow');
                }
            });

            const finalizeReveal = () => {
                els.wordInputsContainer.classList.add('hidden');
                els.feedbackArea.classList.remove('hidden');

                els.feedbackArea.innerHTML = `
                    <div class="text-cyan-400 font-bold mb-5 flex items-center gap-3 text-2xl drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">
                        <i class="fa-solid fa-eye"></i> Decrypted Signal:
                    </div>
                    <div class="text-slate-200 text-xl font-medium p-6 bg-white/5 rounded-2xl border border-white/10 shadow-inner mb-5">${sentences[currentIndex]}</div>
                    <div class="text-cyan-200/80 text-lg italic border-l-4 border-cyan-500/50 pl-4 py-2 bg-cyan-900/10 rounded-r-xl">${translations[currentIndex]}</div>
                `;

                scores[currentIndex] = { accuracy: 0, isPerfect: false };
                isAnswerChecked = true;

                els.btnCheck.classList.add('hidden');
                els.btnShowAnswer.classList.add('hidden');
                els.btnNext.classList.remove('hidden');

                if (currentIndex === sentences.length - 1) {
                    els.btnNext.innerHTML = 'Complete Mission <i class="fa-solid fa-flag-checkered"></i>';
                }
            };

            // Nếu chưa đúng 100%, CHỈ rung báo lỗi và BẮT BUỘC user sửa/bấm hint
            if (hasError) {
                els.btnCheck.disabled = true;
                els.btnShowAnswer.disabled = true;
                setTimeout(() => {
                    els.btnCheck.disabled = false;
                    els.btnShowAnswer.disabled = false;

                    let firstWrong = null;
                    inputs.forEach((input, idx) => {
                        const uVal = input.value.trim().toLowerCase();
                        const cVal = correctWordsArray[idx];
                        if (uVal !== cVal) {
                            input.value = ''; // Xoá chữ sai
                            input.classList.remove('error-shake'); // Trả lại trạng thái bình thường
                            if (!firstWrong) firstWrong = input;
                        }
                    });

                    // Focus vào ô sai đầu tiên để bắt buộc gõ lại
                    if (firstWrong) firstWrong.focus();
                }, 800);
            } else {
                finalizeReveal();
            }
        }

        function previousSentence() {
            if (currentIndex > 0) {
                stopAudio();
                currentIndex--;
                resetForNextSentence();
            }
        }

        function nextSentence() {
            if (currentIndex < sentences.length - 1) {
                stopAudio();
                currentIndex++;
                resetForNextSentence();
            } else {
                showFinalResults();
            }
        }

        function resetForNextSentence() {
            isAnswerChecked = false;

            renderWordInputs();
            els.wordInputsContainer.classList.remove('hidden');
            els.feedbackArea.classList.add('hidden');

            els.btnCheck.classList.remove('hidden');
            els.btnShowAnswer.classList.remove('hidden');
            els.btnNext.classList.add('hidden');
            els.btnNext.innerHTML = 'Next Signal <i class="fa-solid fa-arrow-right"></i>';

            updateUI();

            const firstInput = els.wordInputsContainer.querySelector('input');
            if (firstInput) firstInput.focus();
        }

        function updateUI() {
            els.currentIndicator.textContent = `${currentIndex + 1}/${sentences.length}`;
            const progress = ((currentIndex) / sentences.length) * 100;
            els.progressBar.style.width = `${progress}%`;

            if (currentIndex > 0) {
                els.btnBack.disabled = false;
                els.btnBack.classList.remove('opacity-30', 'cursor-not-allowed');
                els.btnBack.classList.add('hover:bg-white/10', 'hover:shadow-[0_0_15px_rgba(255,255,255,0.1)]');
            } else {
                els.btnBack.disabled = true;
                els.btnBack.classList.add('opacity-30', 'cursor-not-allowed');
                els.btnBack.classList.remove('hover:bg-white/10', 'hover:shadow-[0_0_15px_rgba(255,255,255,0.1)]');
            }
        }

        function showFinalResults() {
            els.mainPanel.classList.add('hidden');
            els.resultSummary.classList.remove('hidden');

            els.progressBar.style.width = '100%';
            els.currentIndicator.textContent = 'Mission Complete';

            let perfectSentencesCount = 0;
            let sentencesWithHints = 0;
            let totalHintsUsed = 0;

            els.hintsList.innerHTML = '';

            hintsTracker.forEach((hints, index) => {
                totalHintsUsed += hints.length;

                if (hints.length === 0) {
                    perfectSentencesCount++;
                } else {
                    sentencesWithHints++;
                    const li = document.createElement('li');
                    li.className = 'text-sm text-slate-300 bg-white/5 p-4 rounded-xl border border-white/5 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4';
                    li.innerHTML = `<span class="font-bold text-indigo-400 min-w-[5rem]">Signal ${index + 1}</span> <span class="hidden sm:inline text-white/20">|</span> <span>Used ${hints.length} hint(s):</span> <span class="text-cyan-300 font-medium bg-cyan-500/10 px-3 py-1 rounded-lg">${hints.join(', ')}</span>`;
                    els.hintsList.appendChild(li);
                }
            });

            if (totalHintsUsed > 0) {
                els.hintsDetailsContainer.classList.remove('hidden');
            } else {
                els.hintsDetailsContainer.classList.add('hidden');
            }

            const totalAccuracyCalc = scores.reduce((sum, s) => sum + (s ? s.accuracy : 0), 0);
            const avgAccuracy = Math.round(totalAccuracyCalc / sentences.length);

            // Xử lý ngày giờ hiện tại
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            els.completionDate.innerHTML = `<i class="fa-regular fa-clock text-indigo-400"></i> Completed on: ${now.toLocaleString('en-US', dateOptions)}`;

            els.scoreDisplay.textContent = `${perfectSentencesCount}/${sentences.length}`;
            els.accuracyDisplay.textContent = `${avgAccuracy}%`;
            els.hintsDisplay.textContent = `${sentencesWithHints}/${sentences.length}`;
        }

        function restart() {
            currentIndex = 0;
            scores = new Array(sentences.length).fill(null);
            hintsTracker = new Array(sentences.length).fill(null).map(() => []); // Reset tracker

            els.resultSummary.classList.add('hidden');
            els.mainPanel.classList.remove('hidden');

            els.btnNext.innerHTML = 'Next Signal <i class="fa-solid fa-arrow-right"></i>';

            resetForNextSentence();
        }

        function setupEventListeners() {
            els.btnPlay.addEventListener('click', () => {
                if (isPlaying) stopAudio();
                else playAudio();
            });

            els.btnSlow.addEventListener('click', () => {
                currentRate = 0.75;
                els.btnSlow.classList.add('bg-indigo-500/30', 'ring-1', 'ring-indigo-400/50', 'text-white');
                els.btnSlow.classList.remove('text-indigo-400');
                els.btnNormal.classList.remove('bg-indigo-500/30', 'ring-1', 'ring-indigo-400/50', 'text-white');
                els.btnNormal.classList.add('text-white');
                if (currentAudio) currentAudio.playbackRate = currentRate;
                if (!isPlaying) playAudio();
            });

            els.btnNormal.addEventListener('click', () => {
                currentRate = 1.0;
                els.btnNormal.classList.add('bg-indigo-500/30', 'ring-1', 'ring-indigo-400/50', 'text-white');
                els.btnNormal.classList.remove('text-indigo-400');
                els.btnSlow.classList.remove('bg-indigo-500/30', 'ring-1', 'ring-indigo-400/50', 'text-white');
                els.btnSlow.classList.add('text-indigo-400');
                if (currentAudio) currentAudio.playbackRate = currentRate;
                if (!isPlaying) playAudio();
            });

            els.btnCheck.addEventListener('click', checkAnswer);
            els.btnShowAnswer.addEventListener('click', showAnswer);
            els.btnBack.addEventListener('click', previousSentence);
            els.btnNext.addEventListener('click', nextSentence);
            els.btnRestart.addEventListener('click', restart);
        }

        // --- Run ---
        window.addEventListener('DOMContentLoaded', init);

    </script>
