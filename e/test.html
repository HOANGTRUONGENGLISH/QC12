        passage: "Corporate Communications Department Memorandum\n\nTO: All Staff Members\nFROM: IT Support Team\nDATE: October 25, 2025\nRE: New Phone System Implementation\n\nDear Colleagues,\nWe are pleased to announce that our company has successfully (1) ______ over to a state-of-the-art digital telephone system. This upgrade will enhance communication efficiency across all departments.\n\n1. Key Features\nThe new system provides (2) ______ of advanced capabilities including call forwarding, voicemail-to-email, conference calling, and automated attendant services.\n\n2. Making Calls\nTo place external calls, dial 9 first, (3) ______ enter the complete phone number including area code. Internal extensions remain unchanged.\n\n3. Technical Support\nOur (4) ______ help desk team is available 24/7 to address any technical issues. For assistance, please call extension 5000 (5) ______ submit a support ticket through the company portal.\n\nWe encourage everyone to (6) ______ themselves with the new system’s user manual, which has been emailed to all staff members. Training sessions will be conducted next week.\n\nThank you for your cooperation.",
        passageTranslation: "Bản ghi nhớ của Phòng Truyền thông Doanh nghiệp\n\nGửi: Tất cả nhân viên\nTừ: Đội ngũ Hỗ trợ IT\nNgày: 25 tháng 10, 2025\nV/v: Triển khai hệ thống điện thoại mới\n\nKính gửi các đồng nghiệp,\nChúng tôi vui mừng thông báo rằng công ty chúng ta đã chuyển đổi thành công sang một hệ thống điện thoại kỹ thuật số hiện đại. Việc nâng cấp này sẽ tăng cường hiệu quả giao tiếp trên tất cả các phòng ban.\n\n1. Tính năng chính\nHệ thống mới cung cấp một loạt các khả năng tiên tiến bao gồm chuyển tiếp cuộc gọi, thư thoại qua email, gọi hội nghị, và các dịch vụ trả lời tự động.\n\n2. Thực hiện cuộc gọi\nĐể gọi ra ngoài, hãy quay số 9 trước, sau đó nhập đầy đủ số điện thoại bao gồm mã vùng. Số máy lẻ nội bộ không thay đổi.\n\n3. Hỗ trợ kỹ thuật\nĐội ngũ hỗ trợ kỹ thuật tận tâm và đa ngôn ngữ của chúng tôi có mặt 24/7 để giải quyết bất kỳ vấn đề kỹ thuật nào. Để được hỗ trợ, vui lòng gọi số máy lẻ 5000 hoặc gửi yêu cầu hỗ trợ qua cổng thông tin công ty.\n\nChúng tôi khuyến khích mọi người làm quen với hướng dẫn sử dụng của hệ thống mới, vốn đã được gửi email tới toàn bộ nhân viên. Các buổi đào tạo sẽ được tổ chức vào tuần tới.\n\nCảm ơn sự hợp tác của các bạn.",

        title: "Part 2: Guided Cloze Test - Public Education Systems",

        passage: "Public education systems emerged in the 19th century as nations recognized the importance of an educated citizenry. (7) _______. This movement reflected growing beliefs that literacy and basic knowledge were essential for economic development and social progress.\n\nEarly public schools faced numerous challenges, including inadequate funding and resistance from traditional institutions. (8) _______. Despite these obstacles, reformers continued advocating for universal access to education, arguing it would reduce poverty and crime.\n\nThe establishment of compulsory attendance laws marked a turning point in educational history. (9) _______. This legislation ensured that children from all social classes received at least elementary instruction in reading, writing, and arithmetic.\n\nTeacher training programs evolved to meet the demands of expanding school systems across Europe and America. (10) _______. These institutions helped standardize educational practices and improve the quality of instruction in public classrooms.\n\nBy the early 20th century, public education had become a cornerstone of modern society. (11) _______. Today, access to free education is widely recognized as a fundamental human right and a prerequisite for democratic participation.",
        passageTranslation: "Hệ thống giáo dục công cộng xuất hiện vào thế kỷ 19 khi các quốc gia nhận ra tầm quan trọng của một công dân có học thức. Phổ đã thiết lập việc học tập miễn phí, do nhà nước tài trợ trong suốt đầu những năm 1800, một mô hình mà các quốc gia châu Âu khác sau đó đã áp dụng. Phong trào này phản ánh niềm tin ngày càng tăng rằng xóa mù chữ và kiến thức cơ bản là thiết yếu đối với phát triển kinh tế và tiến bộ xã hội.\n\nCác trường công lập thời kỳ đầu đối mặt với vô số thách thức, bao gồm việc thiếu kinh phí và sự chống đối từ các thể chế truyền thống. Nhiều gia đình phụ thuộc vào sức lao động của trẻ em để có thu nhập; do đó, việc đi học đồng nghĩa với việc mất đi những nhân công quý giá. Bất chấp những trở ngại này, các nhà cải cách vẫn tiếp tục vận động cho quyền tiếp cận giáo dục phổ cập, lập luận rằng nó sẽ giúp giảm nghèo đói và tội phạm.\n\nViệc ban hành các luật bắt buộc đi học đã đánh dấu một bước ngoặt trong lịch sử giáo dục. Các chính phủ đã thiết lập việc bắt buộc đi học cho trẻ em từ 6 đến 14 tuổi trong thời kỳ này. Pháp luật này đảm bảo rằng trẻ em thuộc mọi tầng lớp xã hội đều nhận được ít nhất nền tảng giáo dục tiểu học về đọc, viết và toán số.\n\nCác chương trình đào tạo giáo viên đã tiến hóa để đáp ứng nhu cầu mở rộng của các hệ thống trường học trên khắp châu Âu và châu Mỹ. Các trường sư phạm được thành lập để chuẩn bị cho các cá nhân theo nghề dạy học, cung cấp cả đào tạo học thuật và thực hành. Những thể chế này đã giúp chuẩn hóa thực tiễn giáo dục và nâng cao chất lượng giảng dạy tại các lớp học công lập.\n\nVào đầu thế kỷ 20, giáo dục công cộng đã trở thành nền tảng của xã hội hiện đại. Các hệ thống giáo dục tiếp tục mở rộng các cơ hội, cung cấp sự hướng dẫn chuyên biệt giúp học sinh chuẩn bị cho những sự nghiệp đa dạng. Ngày nay, quyền tiếp cận giáo dục miễn phí được công nhận rộng rãi là quyền cơ bản của con người và là điều kiện tiên quyết cho sự tham gia dân chủ.",
        questions: [
          {
            id: 7, text: "Question 7", options: [

          }

      },
      {
        title: "Part 3: Reading Comprehension - Influencer Marketing",
        instruction: "Read the passage and mark the letter A, B, C or D on your answer sheet to indicate the best answer to each of the following questions from 12 to 19.",
        passage: "Influencer marketing leverages creators whose audiences trust their recommendations to publicize a brand’s offer. Rather than renting attention through ads, brands borrow credibility, reaching people predisposed to care. The practice typically remunerates creators to deliver content from a negotiated brief and timeline; outcomes are then tracked. Because the creator’s authority is pre-existing, such campaigns can rival paid media for efficiency, especially when audience–product fit is tight. In short, influence works by converting trust into action across preferred platforms.\n\nDefining an influencer hinges on demonstrable pull: the capacity to nudge followers to click, read, subscribe, or purchase. Creators range from nano and micro to macro and mega tiers. Budget matters, but suitability matters more: audience relevance and engagement rates are pivotal. Micro creators often sustain 3–7% engagement, whereas mega figures hover nearer 1%. As follower counts swell, passive onlookers accumulate, diluting interaction. Consequently, many brands court smaller, highly-engaged niches where persuasion feels conversational rather than broadcast.\n\nBrands pursue influencers because results are both potent and legible. Marketers widely judge the channel effective, not least since audiences treat creator guidance as credible and specific. Partnerships also filter for better customers by targeting communities already intrigued by a category. Crucially, sponsored posts yield measurable signals – conversions, click-throughs, views, and reach – so performance can be attributed to particular creators and platforms. When numbers clarify what works, budgets migrate accordingly; they also encourage repeat collaborations that scale what already resonates.\n\nA typical program proceeds methodically: find aligned creators; agree a brief; manage production; approve assets; publish; measure ROI. Contracts codify deliverables, deadlines, tracking links, and ownership, while disclosures keep campaigns lawful. Brands should plan in detail yet leave room for the creator’s distinctive voice. Integration with wider efforts – ads, SEO, email – amplifies impact, and network choice follows the target audience, whether Instagram, YouTube, LinkedIn, or emerging streams. Above all, transparent labeling ensures content is compliant with advertising rules.",
        passageTranslation: "Tiếp thị qua người ảnh hưởng (Influencer marketing) tận dụng các nhà sáng tạo nội dung, những người có tệp khán giả tin tưởng vào các đề xuất của họ để quảng bá về ưu đãi của một thương hiệu. Thay vì 'thuê' sự chú ý thông qua quảng cáo, các thương hiệu mượn sự uy tín, tiếp cận những người đã có xu hướng quan tâm. Hoạt động này thường trả thù lao cho người sáng tạo để sản xuất nội dung dựa trên một bản tóm tắt và mốc thời gian đã được thỏa thuận; các kết quả sau đó được theo dõi. Bởi vì quyền uy của người sáng tạo là có sẵn từ trước, các chiến dịch này có thể cạnh tranh với truyền thông trả phí về mặt hiệu quả, đặc biệt khi sự phù hợp giữa khán giả và sản phẩm là rất sát. Tóm lại, ảnh hưởng hoạt động bằng cách chuyển đổi sự tin tưởng thành hành động trên các nền tảng được ưa chuộng.\n\nViệc định nghĩa một người ảnh hưởng phụ thuộc vào sức hút có thể chứng minh được: khả năng thúc đẩy người theo dõi nhấp chuột, đọc, đăng ký hoặc mua hàng. Người sáng tạo dao động từ hạng nano, micro cho tới macro và mega. Ngân sách là quan trọng, nhưng sự phù hợp còn quan trọng hơn: mức độ liên quan của khán giả và tỷ lệ tương tác là then chốt. Những người sáng tạo micro (nhỏ) thường duy trì tỷ lệ tương tác từ 3-7%, trong khi các nhân vật mega (lớn) chỉ lơ lửng ở mức gần 1%. Khi số lượng người theo dõi phình to, những người xem thụ động tích tụ lại, làm loãng sự tương tác. Do đó, nhiều thương hiệu 'tán tỉnh' những thị trường ngách nhỏ hơn nhưng có độ tương tác cao, nơi sự thuyết phục có cảm giác như một cuộc trò chuyện thay vì một chương trình phát sóng.\n\nCác thương hiệu theo đuổi những người ảnh hưởng vì kết quả mang lại vừa mạnh mẽ vừa rõ ràng (legible). Các nhà tiếp thị đánh giá rộng rãi kênh này là hiệu quả, không phải vì điều gì khác ngoài việc khán giả coi các hướng dẫn của người sáng tạo là đáng tin cậy và cụ thể. Quan hệ đối tác cũng giúp lọc ra những khách hàng chất lượng hơn bằng cách nhắm mục tiêu vào các cộng đồng đã tò mò về một danh mục sản phẩm nào đó. Yếu tố cốt lõi là các bài đăng được tài trợ mang lại những tín hiệu có thể đo lường được – số chuyển đổi, lượt nhấp chuột, lượt xem, và phạm vi tiếp cận – để hiệu suất có thể được ghi nhận cho những người sáng tạo và nền tảng cụ thể. Khi các con số làm sáng tỏ những gì đang hoạt động tốt, ngân sách sẽ dịch chuyển tương ứng; chúng (they) cũng khuyến khích sự hợp tác lặp lại để nhân rộng những gì vốn đã tạo ra tiếng vang.\n\nMột chương trình điển hình diễn ra có phương pháp: tìm kiếm người sáng tạo phù hợp; chốt bản tóm tắt (brief); quản lý sản xuất; phê duyệt tài liệu; xuất bản; đo lường ROI (lợi tức đầu tư). Hợp đồng mã hóa các hạng mục chuyển giao, hạn chót, liên kết theo dõi, và quyền sở hữu, trong khi các tiết lộ giữ cho chiến dịch hợp pháp. Các thương hiệu nên lập kế hoạch chi tiết nhưng vẫn cần chừa không gian cho tiếng nói đặc trưng của người sáng tạo. Tích hợp cùng với các nỗ lực rộng lớn hơn – như quảng cáo, SEO, email – sẽ khuếch đại sự tác động, và việc lựa chọn mạng lưới đi theo khán giả mục tiêu, dù là Instagram, YouTube, LinkedIn, hay các luồng xu hướng mới nổi. Trên hết, việc dán nhãn minh bạch đảm bảo nội dung tuân thủ đúng luật quảng cáo.",
        questions: [
          { id: 12, text: "Which of the following is NOT mentioned in paragraph 2 as a factor when selecting influencers?", options: ["audience relevance", "engagement rates", "production equipment quality", "budget considerations"], correct: 2, explanation: "Đoạn 2 liệt kê các yếu tố: Budget matters (ngân sách), audience relevance (mức độ liên quan), engagement rates (tỷ lệ tương tác). KHÔNG có đề cập đến 'production equipment quality' (Chất lượng thiết bị sản xuất)." },
          { id: 13, text: "The word legible in paragraph 3 can be best replaced by ______?", options: ["decipherable", "ornamental", "precarious", "redundant"], correct: 0, explanation: "Từ 'legible' thường mang nghĩa 'rõ ràng, có thể đọc/thấy được' (tương tự như decipherable - có thể giải mã/hiểu được). Ngữ cảnh ở đây nói về kết quả rõ ràng, đo lường được." },
          { id: 14, text: "The word compliant in paragraph 4 is OPPOSITE in meaning to ______.", options: ["defiant", "obedient", "amenable", "acquiescent"], correct: 0, explanation: "Từ 'compliant' mang nghĩa 'tuân thủ'. Trái nghĩa với tuân thủ là 'defiant' (chống đối, bất tuân)." },

      {
        title: "Part 4: Reading Comprehension - Right to Repair",
        instruction: "Read the passage and mark the letter A, B, C or D on your answer sheet to indicate the best answer to each of the following questions from 20 to 29.",
        passage: "Right to Repair affirms that if you bought a device, you should be free to fix it – yourself or wherever you choose. Many manufacturers corral repairs into proprietary channels, imposing restrictive regimes that gatekeep diagnostics and parts. [I] This consolidation creates a monopoly on repair, letting companies name their price, dictate turnaround, and decline “uneconomical” fixes, with predictable fallout: gadgets are discarded prematurely. Legally and ethically, critics argue, such lock-ins externalize waste while eroding consumer autonomy and local repair economies.\n\nLegislative proposals seek to redress that asymmetry by requiring manufacturers to supply repair documentation, parts, and tools to consumers and independent shops. By mandating open access to manuals, parts, and tools, lawmakers aim to puncture manufacturers’ repair monopolies rather than micromanage how people repair. The practical effect would be to normalize community repair and allow informed DIY. [II] Opponents warn about safety and intellectual property; supporters counter that transparency, not secrecy, is the credible route to safe, affordable, environmentally prudent maintenance.\n\nSince 2003, iFixit has agitated for repair-friendly design and policy. Early on, industry largely ignored these calls; persistence turned iFixit into a repair authority that publishes teardowns, assigns repairability scores, and publicly calls out unfixable designs. In 2014, the group helped craft the first-ever electronics Right to Repair bill. [III] Subsequent campaigns have supported legislation in forty-six U.S. states and in the European Union, building a transatlantic coalition that reframes repair as infrastructure, not niche hobby.\n\nAdvocacy has been concrete as well as conceptual: iFixit publicly urged New York Governor Kathy Hochul to sign a state repair bill via a billboard along her commute. It even drove a tractor to the Colorado legislature to celebrate the first agricultural repair law’s passage. The group co-sponsored California’s bill, which cleared the State Senate in June 2023. [IV] In Europe, iFixit has been a founding member of coalitions such as Repair.eu and Runder Tisch Reparatur, sustaining momentum.",
        passageTranslation: "Quyền Sửa chữa (Right to Repair) khẳng định rằng nếu bạn mua một thiết bị, bạn phải được tự do sửa chữa nó – tự làm hoặc tại bất cứ nơi nào bạn chọn. Nhiều nhà sản xuất khoanh vùng việc sửa chữa vào các kênh độc quyền, áp đặt các chế độ hạn chế nhằm kiểm soát chẩn đoán và linh kiện. [I] Sự hợp nhất này tạo ra thế độc quyền về sửa chữa, cho phép các công ty tự định giá, ấn định thời gian xoay vòng, và từ chối những sửa chữa 'không hiệu quả kinh tế', với hậu quả dễ đoán: các thiết bị bị vứt bỏ sớm. Về mặt pháp lý và đạo đức, các nhà phê bình lập luận rằng sự trói buộc này đẩy lượng rác thải ra bên ngoài trong khi làm xói mòn quyền tự chủ của người tiêu dùng và nền kinh tế sửa chữa địa phương.\n\nCác đề xuất lập pháp tìm cách khắc phục sự bất cân xứng đó bằng cách yêu cầu các nhà sản xuất cung cấp tài liệu sửa chữa, linh kiện và công cụ cho người tiêu dùng và các cửa hàng độc lập. Bằng cách bắt buộc mở quyền truy cập vào sách hướng dẫn, linh kiện và công cụ, các nhà làm luật nhắm đến việc đâm thủng sự độc quyền sửa chữa của nhà sản xuất thay vì quản lý vi mô cách mọi người sửa chữa. Tác động thực tế sẽ là bình thường hóa việc sửa chữa tại cộng đồng và cho phép phong trào DIY (tự tay làm) có thông tin. [II] Những người phản đối cảnh báo về độ an toàn và tài sản trí tuệ; những người ủng hộ phản bác rằng minh bạch, chứ không phải bí mật, mới là con đường đáng tin cậy dẫn đến việc bảo trì an toàn, giá cả phải chăng, và thận trọng với môi trường.\n\nKể từ năm 2003, iFixit đã vận động cho các thiết kế và chính sách thân thiện với việc sửa chữa. Thuở ban đầu, ngành công nghiệp phần lớn phớt lờ những lời kêu gọi này; nhưng sự kiên trì đã biến iFixit thành một thế lực thẩm quyền về sửa chữa, chuyên xuất bản các bài 'mổ xẻ' thiết bị, chấm điểm khả năng sửa chữa, và công khai bêu tên các thiết kế không thể sửa chữa. Năm 2014, nhóm đã giúp soạn thảo dự luật Quyền Sửa chữa thiết bị điện tử đầu tiên. [III] Các chiến dịch tiếp theo đã hỗ trợ lập pháp tại 46 bang của Hoa Kỳ và ở Liên minh Châu Âu, xây dựng một liên minh xuyên Đại Tây Dương nhằm tái định hình việc sửa chữa như một cơ sở hạ tầng thiết yếu chứ không phải một sở thích ngách.\n\nSự ủng hộ đã rất cụ thể cũng như mang tính khái niệm: iFixit công khai hối thúc Thống đốc New York Kathy Hochul ký một dự luật sửa chữa của bang thông qua một biển quảng cáo dọc tuyến đường đi làm của bà. Nhóm thậm chí còn lái một chiếc máy kéo đến cơ quan lập pháp Colorado để ăn mừng việc thông qua luật sửa chữa máy móc nông nghiệp đầu tiên. Nhóm cũng đồng tài trợ cho dự luật của bang California, dự luật vừa được Thượng viện Bang thông qua vào tháng 6 năm 2023. [IV] Tại Châu Âu, iFixit là thành viên sáng lập của các liên minh như Repair.eu và Runder Tisch Reparatur, nhằm duy trì đà phát triển.",

        passage: "Da Nang University Launches Groundbreaking Pickleball Training Program\n\nProgram Overview\nDa Nang University of Physical Education and Sports has introduced Vietnam’s first specialized pickleball training program, (30) ______ offers comprehensive instruction in this rapidly growing sport. The curriculum combines practical skills development with sports management and coaching methodologies.\n\nCurriculum Details\nStudents (31) ______ in the program will study biomechanics, nutrition science, and advanced training techniques alongside technical pickleball skills. The university has invested in state-of-the-art facilities featuring a considerable (32) ______ of professional courts and equipment. Faculty members include international coaches (33) ______ expertise spans competitive play and sports science research.\n\nCareer Prospects\nGraduates will be (34) ______ positioned to pursue careers as professional athletes, coaches, or sports administrators as pickleball continues its explosive growth across Asia. The program aims to (35) ______ Vietnam’s potential in developing world-class pickleball talent and establishing the nation as a regional training hub.\n\nApplications open March 1st. Visit https://dnupes.edu.vn/pickleball-program for enrollment information.",

          { id: 37, text: "a. Concurrently, public awareness campaigns were launched, encouraging households to participate actively in separation schemes at the source.\nb. Recycling facilities were expanded considerably, with specialized plants dedicated to processing plastic, organic matter, and electronic waste.\nc. This transformation signifies a paradigm shift towards circular economy principles and environmental stewardship in Vietnamese urban centers.\nd. Major cities like Hanoi and Da Nang initiated comprehensive waste segregation programs beginning in the late 2010s.\ne. The implementation was further reinforced by stringent penalties for non-compliance, ensuring widespread adherence to new regulations.", options: ["d-a-b-e-c", "d-b-a-c-e", "c-d-b-a-e", "d-b-e-a-c"], correct: 0, explanation: "Thứ tự: Giới thiệu chương trình ở Hà Nội, ĐN (d) -> Phát động chiến dịch nhận thức (a) -> Mở rộng nhà máy tái chế (b) -> Củng cố bằng hình phạt (e) -> Kết luận về ý nghĩa (c)." },
          { id: 38, text: "a. We are introducing a diversified investment and protection package tailored to moderate risk profiles.\nb. To begin, complete the suitability assessment and share income statements through our encrypted link.\nc. Our advisors will construct an allocation and confirm underwriting results within three business days.\nd. Please note, introductory bonuses apply to applications submitted before 30 September this year.\ne. For a consultation, reply to this email or schedule via the client portal.", options: ["a-b-c-d-e", "b-a-c-d-e", "a-c-b-d-e", "a-b-d-c-e"], correct: 0, explanation: "Thứ tự thư chào hàng chuẩn: Giới thiệu gói đầu tư (a) -> Hướng dẫn bước đầu tiên (b) -> Lời hứa của tư vấn viên (c) -> Lưu ý thời hạn ưu đãi (d) -> Gọi hành động liên hệ (e)." },
          { id: 39, text: "a. After receiving harsh feedback on my literature essay, I initially felt discouraged and wanted to give up entirely.\nb. My teacher pointed out numerous weaknesses, yet I had expected praise for what I considered excellent work.\nc. This difficult moment ultimately helped me develop a growth mindset and embrace constructive criticism more openly.\nd. I decided to meet with my teacher regularly and worked hard to strengthen my analytical writing skills.\ne. During sophomore year, I submitted what I believed was my best analytical essay about Shakespeare’s themes.", options: ["e-b-a-d-c", "a-e-b-d-c", "e-a-b-c-d", "c-e-b-a-d"], correct: 0, explanation: "Mạch truyện logic: Nộp bài tâm đắc nhất (e) -> Bị giáo viên chỉ ra nhiều lỗi (b) -> Cảm thấy chán nản (a) -> Quyết định rèn luyện chăm chỉ (d) -> Bài học trưởng thành (c)." },
          { id: 40, text: "a. Rachel: Do you still read printed newspapers every morning?\nb. Tom: Exactly, that’s why traditional journalism still carries a sense of credibility.\nc. Tom: Not really. I mostly scroll through social media for quick updates.\nd. Rachel: Yes, both platforms inform the public in their own unique ways.\ne. Rachel: I agree, but social media spreads unverified news quite often.", options: ["a-b-c-d-e", "a-b-d-c-e", "b-a-c-e-d", "a-c-e-b-d"], correct: 3, explanation: "Hội thoại: Rachel hỏi (a) -> Tom trả lời không, dùng MXH (c) -> Rachel nói MXH hay lan truyền tin giả (e) -> Tom đồng ý, đó là lý do báo chí truyền thống vẫn uy tín (b) -> Rachel kết luận (d)." }
        ]
      }
    ];

    // State quản lý
    const state = {
      answers: {},
      isSubmitted: false,
      score: 0,
      currentPartIndex: 0,
      showPassageTranslation: false,
      expandedExplanations: {}
    };

    const totalQuestions = quizData.reduce((acc, curr) => acc + curr.questions.length, 0);
    const allQuestions = quizData.flatMap(s => s.questions);

    // Hàm render giao diện chính
    function renderApp() {
      const app = document.getElementById('app');
      const answeredCount = Object.keys(state.answers).length;
      const currentSection = quizData[state.currentPartIndex];

      // Lưu vị trí cuộn
      const qContainer = document.getElementById('questions-container');
      const scrollPos = qContainer ? qContainer.scrollTop : 0;

      let html = `
                <!-- Header -->
                <div id="main-header" class="flex-none bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex justify-between items-center z-30">
                    <div>
                        <h1 class="text-xl font-bold text-blue-700 flex items-center gap-2">
                            <i class="fa-regular fa-file-lines text-blue-600"></i>
                            Đề Thi Thử Số 05 - Tiếng Anh
                        </h1>
                        <p class="text-sm text-slate-500">Mã đề: 1126 | Thời gian làm bài: 50 phút</p>
                    </div>
                    ${!state.isSubmitted ? `
                    <div class="text-sm font-medium bg-blue-100 text-blue-800 px-3 py-1 rounded-full border border-blue-200 hidden md:block">
                        Đã làm: ${answeredCount} / ${totalQuestions}
                    </div>
                    ` : `
                    <div class="text-sm font-bold bg-green-100 text-green-800 px-4 py-2 rounded-full border border-green-300 flex items-center gap-2">
                        <i class="fa-solid fa-award"></i> Điểm: ${state.score} / ${totalQuestions}
                    </div>
                    `}
                </div>

                <!-- Main Body -->
                <div class="flex-1 flex flex-col min-h-0 w-full max-w-7xl mx-auto px-2 md:px-4 py-3 md:py-4 gap-4">
                    
                    ${state.isSubmitted ? `
                    <div class="flex-none bg-white p-4 rounded-xl border border-green-200 shadow-sm flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-4 animate-in fade-in duration-500">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-circle-check text-green-500 text-4xl"></i>
                            <div>
                                <h2 class="text-xl font-bold text-slate-800">Hoàn thành bài thi!</h2>
                                <p class="text-slate-600 text-sm">
                                    Số câu đúng: <strong class="text-green-600 text-lg">${state.score}</strong> / ${totalQuestions} &nbsp;—&nbsp; 
                                    <span class="italic hidden md:inline">Nhấn "Xem giải thích chi tiết" ở mỗi câu để tự học nhé.</span>
                                </p>
                            </div>
                        </div>
                        <button onclick="resetQuiz()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow font-medium">
                            Làm lại bài thi
                        </button>
                    </div>
                    ` : ''}

                    <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-0 relative">
                        <div class="flex-none bg-slate-50 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                            <div>
                                <h2 class="text-base md:text-lg font-bold text-blue-900">${currentSection.title}</h2>
                                ${currentSection.instruction ? `<p class="text-xs md:text-sm text-slate-600 mt-0.5 italic line-clamp-1 md:line-clamp-none">${currentSection.instruction}</p>` : ''}
                            </div>
                            <span class="flex-none text-xs md:text-sm font-bold text-slate-700 bg-white border border-slate-300 px-3 py-1.5 rounded-lg shadow-sm whitespace-nowrap ml-2">
                                Phần ${state.currentPartIndex + 1}/${quizData.length}
                            </span>
                        </div>
                        
                        <!-- CHIA CỘT DỌC TẠI ĐÂY -->
                        <div class="flex-1 flex flex-col md:flex-row min-h-0">
                            ${currentSection.passage ? `
                            <div id="passage-container" class="flex-none h-[40%] md:h-full md:flex-1 md:w-1/2 overflow-y-auto bg-slate-50/80 border-b-[3px] md:border-b-0 md:border-r-[3px] border-blue-200 p-4 md:p-6 lg:p-8 shadow-inner">
                                <div class="flex justify-between items-center mb-3 pb-2 border-b border-blue-100/50 sticky top-0 bg-slate-50/90 backdrop-blur-sm z-10 py-2">
                                    <div class="font-bold text-blue-800 flex items-center gap-2 text-sm uppercase tracking-wide">
                                        <i class="fa-regular fa-file-lines"></i> Đoạn Văn Bài Đọc
                                    </div>
                                    ${state.isSubmitted && currentSection.passageTranslation ? `
                                    <button onclick="togglePassageTranslation()" class="text-xs px-3 py-1.5 rounded flex items-center gap-1.5 font-bold transition-colors border ${state.showPassageTranslation ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'}">
                                        <i class="fa-solid fa-language text-sm"></i>
                                        ${state.showPassageTranslation ? 'Đang xem Tiếng Việt' : 'Xem bản dịch'}
                                    </button>
                                    ` : ''}
                                </div>
                                <div class="text-slate-800 leading-relaxed whitespace-pre-wrap text-[15px] md:text-base font-medium ${state.showPassageTranslation ? 'italic' : ''}">
                                    ${state.showPassageTranslation ? currentSection.passageTranslation : currentSection.passage}
                                </div>
                            </div>
                            ` : ''}

                            <div id="questions-container" class="flex-1 ${currentSection.passage ? 'md:w-1/2' : 'w-full'} overflow-y-auto p-4 md:p-6 lg:p-8 bg-white">
                                <div class="max-w-3xl mx-auto space-y-6">
                                    ${currentSection.questions.map(q => renderQuestion(q)).join('')}

                                    ${!state.isSubmitted && state.currentPartIndex === quizData.length - 1 ? `
                                    <div class="flex justify-center pt-8 pb-8">
                                        <button onclick="calculateScore()" ${answeredCount === 0 ? 'disabled class="opacity-50 px-8 py-3.5 bg-blue-600 text-white font-bold rounded-xl shadow-lg flex items-center gap-2 text-lg cursor-not-allowed"' : 'class="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-all flex items-center gap-2 text-lg"'} >
                                            <i class="fa-solid fa-circle-check"></i> Nộp Bài Ngay
                                        </button>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex-none flex justify-between items-center bg-slate-50 p-2 md:p-3 border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                            <button onclick="changePart(${Math.max(0, state.currentPartIndex - 1)})" ${state.currentPartIndex === 0 ? 'disabled' : ''} class="px-5 py-2 bg-white text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed transition font-medium text-sm md:text-base flex items-center gap-2 shadow-sm">
                                &larr; Quay lại
                            </button>
                            <button onclick="changePart(${Math.min(quizData.length - 1, state.currentPartIndex + 1)})" ${state.currentPartIndex === quizData.length - 1 ? 'disabled' : ''} class="px-5 py-2 bg-blue-600 text-white border border-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition font-bold text-sm md:text-base flex items-center gap-2 shadow-sm">
                                Tiếp theo &rarr;
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Bottom Navigation -->
                <div class="flex-none bg-white border-t border-slate-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] z-50 p-2 md:p-4 relative">
                    <div class="max-w-6xl mx-auto">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm font-bold text-slate-700 uppercase tracking-wide">Tiến độ (${answeredCount}/${totalQuestions})</span>
                            ${!state.isSubmitted ? `
                            <button onclick="calculateScore()" ${answeredCount === 0 ? 'disabled class="opacity-50 px-5 py-1.5 bg-blue-600 text-white text-sm font-bold rounded shadow cursor-not-allowed"' : 'class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded shadow transition-colors"'} >
                                Nộp Bài
                            </button>
                            ` : ''}
                        </div>
                        <div class="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                            ${allQuestions.map(q => {
        const isAnswered = state.answers[q.id] !== undefined;
        let btnClass = "shrink-0 w-9 h-9 rounded-lg text-sm font-bold flex items-center justify-center transition-all border cursor-pointer ";

        if (!state.isSubmitted) {
          btnClass += isAnswered
            ? "bg-blue-600 text-white border-blue-600 shadow-sm"
            : "bg-slate-50 text-slate-600 border-slate-300 hover:bg-slate-200";
        } else {
          const isCorrect = state.answers[q.id] === q.correct;
          btnClass += isCorrect
            ? "bg-green-500 text-white border-green-500 shadow-sm"
            : "bg-red-500 text-white border-red-500 shadow-sm";
        }

        return `<button onclick="scrollToQuestion(${q.id})" class="${btnClass}" title="Đi tới câu ${q.id}">${q.id}</button>`;
      }).join('')}
                        </div>
                    </div>
                </div>
            `;

      app.innerHTML = html;

      // Phục hồi scroll
      const newQContainer = document.getElementById('questions-container');
      if (newQContainer) newQContainer.scrollTop = scrollPos;
    }

    // Render từng câu hỏi
    function renderQuestion(q) {
      const isAnswered = state.answers[q.id] !== undefined;
      const isCorrect = state.answers[q.id] === q.correct;
      const showExp = state.expandedExplanations[q.id];

      let containerClass = `p-4 md:p-5 rounded-xl border transition-all `;
      if (state.isSubmitted) {
        containerClass += isCorrect ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200';
      } else {
        containerClass += isAnswered ? 'bg-slate-50 border-blue-200' : 'bg-white border-slate-200 hover:border-slate-300';
      }

      let optionsHtml = q.options.map((option, optIdx) => {
        const isSelected = state.answers[q.id] === optIdx;
        const isOptionCorrect = optIdx === q.correct;

        let optionClass = "flex items-start gap-3 p-3 rounded-lg border transition-all cursor-pointer ";
        let iconHtml = '';

        if (!state.isSubmitted) {
          optionClass += isSelected
            ? "bg-blue-50 border-blue-400 shadow-sm"
            : "bg-white border-slate-200 hover:bg-slate-50";
        } else {
          optionClass += "cursor-default ";
          if (isOptionCorrect) {
            optionClass += "bg-green-100 border-green-500 font-medium ";
            iconHtml = `<i class="fa-solid fa-check text-green-600 mt-1"></i>`;
          } else if (isSelected && !isOptionCorrect) {
            optionClass += "bg-red-100 border-red-400 ";
            iconHtml = `<i class="fa-solid fa-xmark text-red-500 mt-1"></i>`;
          } else {
            optionClass += "bg-white/50 border-slate-200 opacity-60 ";
          }
        }

        let circleClass = `w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center text-xs font-bold mt-0.5 transition-colors bg-white `;
        if (isSelected) {
          circleClass += (state.isSubmitted && !isOptionCorrect) ? 'border-red-500 text-red-500' : 'border-blue-500 text-blue-500';
        } else {
          circleClass += 'border-slate-300 text-slate-400';
        }
        if (state.isSubmitted && isOptionCorrect) circleClass += ' border-green-600 text-green-600';

        return `
                    <label class="${optionClass}">
                        <input type="radio" name="question-${q.id}" class="hidden" ${isSelected ? 'checked' : ''} ${state.isSubmitted ? 'disabled' : ''} onchange="handleOptionChange(${q.id}, ${optIdx})">
                        <div class="${circleClass}">${String.fromCharCode(65 + optIdx)}</div>
                        <span class="flex-1 text-slate-700 leading-relaxed pt-[2px] text-sm md:text-base">${option}</span>
                        ${iconHtml}
                    </label>
                `;
      }).join('');

      let errorHtml = (state.isSubmitted && !isCorrect) ? `
                <div class="mt-4 flex items-start gap-2 text-sm text-red-700 bg-red-100/50 p-3 rounded-lg border border-red-200">
                    <i class="fa-solid fa-circle-exclamation mt-0.5 text-lg"></i>
                    <p>Bạn đã chọn sai. Đáp án đúng là <strong>${String.fromCharCode(65 + q.correct)}</strong>.</p>
                </div>
            ` : '';

      let explanationHtml = '';
      if (state.isSubmitted && q.explanation) {
        explanationHtml = `
                    <div class="mt-5 border-t border-slate-200/60 pt-4">
                        <button onclick="toggleExplanation(${q.id})" class="flex items-center gap-2 text-sm font-bold transition-colors ${showExp ? 'text-indigo-700' : 'text-blue-600 hover:text-blue-800'}">
                            <i class="fa-solid fa-book-open"></i>
                            ${showExp ? 'Ẩn giải thích' : 'Xem giải thích chi tiết'}
                            <i class="fa-solid ${showExp ? 'fa-chevron-up' : 'fa-chevron-down'} ml-1"></i>
                        </button>
                        
                        ${showExp ? `
                        <div class="mt-4 bg-indigo-50/70 p-4 md:p-5 rounded-xl border border-indigo-100 text-sm text-slate-800 shadow-inner">
                            <div class="whitespace-pre-wrap leading-relaxed">${q.explanation}</div>
                            ${q.translation ? `
                            <div class="mt-4 pt-4 border-t border-indigo-200/60">
                                <div class="flex items-center gap-1.5 font-bold text-indigo-900 mb-2">
                                    <i class="fa-solid fa-language"></i> Bản dịch:
                                </div>
                                <div class="whitespace-pre-wrap leading-relaxed italic text-slate-700">${q.translation}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                    </div>
                `;
      }

      return `
                <div id="question-${q.id}" class="${containerClass}">
                    <div class="flex gap-3">
                        <div class="font-bold text-slate-700 min-w-[65px] pt-0.5">
                            Câu ${q.id}.
                        </div>
                        <div class="flex-1">
                            <p class="text-slate-800 whitespace-pre-wrap mb-4 text-sm md:text-base leading-relaxed">${q.text}</p>
                            <div class="space-y-2.5">
                                ${optionsHtml}
                            </div>
                            ${errorHtml}
                            ${explanationHtml}
                        </div>
                    </div>
                </div>
            `;
    }

    // Event Handlers
    window.handleOptionChange = (qId, optIdx) => {
      if (state.isSubmitted) return;
      state.answers[qId] = optIdx;
      renderApp();
    };

    window.calculateScore = () => {
      let currentScore = 0;
      quizData.forEach(section => {
        section.questions.forEach(q => {
          if (state.answers[q.id] === q.correct) {
            currentScore += 1;
          }
        });
      });
      state.score = currentScore;
      state.isSubmitted = true;
      renderApp();
    };

    window.changePart = (newIndex) => {
      state.currentPartIndex = newIndex;
      state.showPassageTranslation = false; // Reset dịch khi đổi bài
      renderApp();
      setTimeout(() => {
        const qContainer = document.getElementById('questions-container');
        if (qContainer) qContainer.scrollTo({ top: 0, behavior: 'smooth' });
        const pContainer = document.getElementById('passage-container');
        if (pContainer) pContainer.scrollTo({ top: 0, behavior: 'smooth' });
      }, 50);
    };

    window.resetQuiz = () => {
      if (confirm('Bạn có chắc chắn muốn làm lại từ đầu? Mọi đáp án hiện tại sẽ bị xóa.')) {
        state.answers = {};
        state.isSubmitted = false;
        state.score = 0;
        state.expandedExplanations = {};
        changePart(0);
      }
    };

    window.togglePassageTranslation = () => {
      state.showPassageTranslation = !state.showPassageTranslation;
      renderApp();
    };

    window.toggleExplanation = (qId) => {
      state.expandedExplanations[qId] = !state.expandedExplanations[qId];
      renderApp();
    };

    window.performScroll = (id) => {
      const container = document.getElementById('questions-container');
      const el = document.getElementById(`question-${id}`);

      if (container && el) {
        const containerTop = container.getBoundingClientRect().top;
        const elTop = el.getBoundingClientRect().top;
        const currentScroll = container.scrollTop;
        const targetScroll = currentScroll + (elTop - containerTop) - 16;

        container.scrollTo({
          top: targetScroll,
          behavior: "smooth"
        });
      }
    };

    window.scrollToQuestion = (id) => {
      const targetPartIndex = quizData.findIndex(section =>
        section.questions.some(q => q.id === id)
      );

      if (targetPartIndex !== -1 && targetPartIndex !== state.currentPartIndex) {
        state.currentPartIndex = targetPartIndex;
        state.showPassageTranslation = false;
        renderApp();
        setTimeout(() => performScroll(id), 100);
      } else {
        performScroll(id);
      }
    };

    // Khởi chạy lần đầu
    renderApp();

    // ==========================================
    // TÍNH NĂNG QUÉT KHỐI - TỰ ĐỘNG DỊCH VÀ ĐỌC TO (GIỌNG NỮ MIỀN NAM)
    // ==========================================

    // Nạp danh sách các giọng nói có sẵn trên hệ thống
    let availableVoices = [];
    function loadVoices() {
      if ('speechSynthesis' in window) {
        availableVoices = window.speechSynthesis.getVoices();
      }
    }

    if ('speechSynthesis' in window) {
      // Lắng nghe sự kiện thay đổi danh sách giọng đọc (một số trình duyệt nạp bất đồng bộ)
      window.speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
    }

    document.addEventListener('mouseup', handleSelection);
    document.addEventListener('touchend', (e) => {
      setTimeout(() => handleSelection(e), 150);
    });

    async function handleSelection() {
      const selection = window.getSelection();
      const text = selection.toString().trim();

      // Giới hạn độ dài đoạn text để tránh API quá tải
      if (text.length > 0 && text.length < 1500) {
        try {
          // Gọi API miễn phí của Google Translate ngầm
          const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(text)}`);
          const data = await res.json();

          // Lấy kết quả dịch tiếng Việt
          const currentViText = data[0].map(item => item[0]).join('');

          // Tự động đọc to bằng tiếng Việt
          speakText(currentViText);

        } catch (err) {
          console.error("Lỗi dịch thuật:", err);
        }
      } else if (text.length === 0) {
        // Tắt âm thanh ngay lập tức nếu người dùng click ra ngoài (hủy quét khối)
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      }
    }

    // Hàm sử dụng Web Speech API để tìm và đọc giọng miền Nam
    function speakText(text) {
      if (!text || !('speechSynthesis' in window)) return;

      window.speechSynthesis.cancel(); // Tắt ngay luồng đọc cũ nếu đang đọc dở

      const utterance = new SpeechSynthesisUtterance(text);

      // Cố gắng tìm giọng Nữ Miền Nam phụ thuộc vào hệ điều hành
      if (availableVoices.length === 0) loadVoices();

      // Lọc ra tất cả các giọng tiếng Việt có sẵn
      const viVoices = availableVoices.filter(v => v.lang.includes('vi'));
      let selectedVoice = null;

      if (viVoices.length > 0) {
        // Trên Windows: "Microsoft HoaiMy" là giọng nữ miền Nam.
        // Trên iOS/macOS: "Linh" là giọng nữ miền Nam.
        selectedVoice = viVoices.find(v =>
          v.name.includes('HoaiMy') ||
          v.name.includes('Linh') ||
          v.name.toLowerCase().includes('southern') ||
          v.name.toLowerCase().includes('nam')
        );

        // Nếu không tìm thấy giọng miền Nam, tự động dùng giọng tiếng Việt mặc định
        if (!selectedVoice) {
          selectedVoice = viVoices[0];
        }

        utterance.voice = selectedVoice;
      } else {
        // Fallback nếu không quét được danh sách (ví dụ trên một số mobile browser)
        utterance.lang = 'vi-VN';
      }

      utterance.rate = 1.5; // Tốc độ đọc nhanh hơn (1.5x)
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
