<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMMARY COMPLETION - RUBIK'S CUBE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2canvas cho tính năng chụp màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* CSS cho thanh cuộn */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        #passage-container::-webkit-scrollbar,
        #questions-container::-webkit-scrollbar {
            width: 8px;
        }

        #passage-container::-webkit-scrollbar-track,
        #questions-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #passage-container::-webkit-scrollbar-thumb,
        #questions-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
            border: 2px solid white;
        }

        /* Đảm bảo các thẻ định dạng văn bản hoạt động tốt cùng Tailwind */
        #app b,
        #app strong {
            font-weight: bolder;
        }

        #app i,
        #app em {
            font-style: italic;
        }

        #app u {
            text-decoration: underline;
        }

        #app strike,
        #app s {
            text-decoration: line-through;
        }
    </style>
</head>

<body class="h-screen flex flex-col bg-slate-100 text-slate-800 font-sans overflow-hidden">

    <div id="app" class="flex flex-col h-full w-full relative"></div>

    <script>
        const quizData = [
            {
                title: "Summary Completion - RUBIK'S CUBE",
                instruction: "Complete the summary below. Choose NO MORE THAN TWO WORDS from the passage for each answer.",
                passage: "<h2 class='text-xl md:text-2xl font-bold text-slate-900 mb-2'>Rubik’s Cube</h2><h3 class='text-lg font-medium text-slate-700 mb-4 italic'>How the puzzle achieved success</h3><p class='mb-4'>Erno Rubik first studied sculpture and then later architecture in Budapest, where he went on to become a teacher of interior design. It was while he was working as a teacher that he began the preliminary work on an invention that he called the ‘Magic Cube’.</p><p class='mb-4'>Rubik was inspired by geometric puzzles such as the Chinese tangram, a puzzle consisting of various triangles, a square and a parallelogram which can be combined to create different shapes and figures. However, unlike the tangram, which is two-dimensional, Rubik was more interested in investigating how three-dimensional forms, such as the cube, could be moved and combined to produce other forms.</p><p class='mb-4'>His design consisted of a cube made up of layers of individual smaller cubes, and each smaller cube could be turned in any direction except diagonally. To ensure that the cubes could move independently, without falling apart, Rubik first attempted to join them together using elastic bands. However, this proved to be impossible, so Rubik then solved the problem by assembling them using a rounded interior. This permitted them to move smoothly and easily. He experimented with different ways of marking the smaller cubes, but ended up with the simple solution of giving a different colour to each side. The object was to twist the layers of small cubes so that each side of the large cube was an identical colour.</p><p class='mb-4'>Rubik took out a patent for the Cube in 1977 and started manufacturing it in the same year. The Cube came to the attention of a Hungarian businessman, Tibor Laczi, who then demonstrated it at the Nuremberg Toy Fair. When British toy expert Tom Kremer saw it, he thought it was amazing and he persuaded a manufacturer, Ideal Toys, to produce 1 million of them in 1979. Ideal Toys renamed the Cube after the toy’s inventor, and in 1980, Rubik’s Cube was shown at toy fairs all over the world. It won that year’s prize in Germany for Best Puzzle. Rubik’s Cube is believed to be the world’s best-selling puzzle; since its invention, more than 300 million Cubes have been sold worldwide.</p>",
                passageTranslation: "<h2 class='text-xl md:text-2xl font-bold text-slate-900 mb-2'>Khối Rubik</h2><h3 class='text-lg font-medium text-slate-700 mb-4 italic'>Câu đố đã đạt được thành công như thế nào</h3><p class='mb-4'>Erno Rubik ban đầu học điêu khắc và sau đó học kiến trúc tại Budapest, nơi ông tiếp tục trở thành giáo viên thiết kế nội thất. Trong thời gian làm giáo viên, ông đã bắt đầu công việc sơ bộ cho một phát minh mà ông gọi là 'Khối lập phương ma thuật' (Magic Cube).</p><p class='mb-4'>Rubik được truyền cảm hứng từ các câu đố hình học như trò chơi tangram của Trung Quốc, một câu đố bao gồm nhiều hình tam giác khác nhau, một hình vuông và một hình bình hành có thể được kết hợp để tạo ra các hình dạng và hình vẽ khác nhau. Tuy nhiên, không giống như tangram là không gian hai chiều, Rubik quan tâm hơn đến việc điều tra xem các hình thức ba chiều, chẳng hạn như hình khối, có thể được di chuyển và kết hợp như thế nào để tạo ra các hình thức khác.</p><p class='mb-4'>Thiết kế của ông bao gồm một khối lập phương được tạo thành từ các lớp của các khối lập phương nhỏ hơn riêng lẻ, và mỗi khối lập phương nhỏ hơn có thể được xoay theo bất kỳ hướng nào ngoại trừ đường chéo. Để đảm bảo rằng các khối có thể di chuyển độc lập mà không bị rơi ra, ban đầu Rubik đã cố gắng nối chúng lại với nhau bằng các dải thun. Tuy nhiên, điều này được chứng minh là không thể, vì vậy sau đó Rubik đã giải quyết vấn đề bằng cách lắp ráp chúng sử dụng một phần lõi bên trong bo tròn. Điều này cho phép chúng di chuyển trơn tru và dễ dàng. Ông đã thử nghiệm các cách khác nhau để đánh dấu các khối nhỏ hơn, nhưng cuối cùng đã chọn giải pháp đơn giản là tạo cho mỗi mặt một màu khác nhau. Mục tiêu là xoay các lớp của khối nhỏ sao cho mỗi mặt của khối lớn có một màu đồng nhất.</p><p class='mb-4'>Rubik đã xin cấp bằng sáng chế cho Khối Rubik vào năm 1977 và bắt đầu sản xuất nó trong cùng năm. Khối lập phương đã thu hút sự chú ý của một doanh nhân người Hungary, Tibor Laczi, người sau đó đã trình diễn nó tại Hội chợ Đồ chơi Nuremberg. Khi chuyên gia đồ chơi người Anh Tom Kremer nhìn thấy nó, ông nghĩ nó thật tuyệt vời và ông đã thuyết phục một nhà sản xuất, Ideal Toys, sản xuất 1 triệu chiếc vào năm 1979. Ideal Toys đã đổi tên Khối lập phương theo tên người phát minh ra đồ chơi, và vào năm 1980, Khối Rubik đã được trưng bày tại các hội chợ đồ chơi trên toàn thế giới. Nó đã giành giải thưởng năm đó ở Đức cho Câu đố hay nhất. Khối Rubik được cho là câu đố bán chạy nhất thế giới; kể từ khi được phát minh, hơn 300 triệu Khối Rubik đã được bán ra trên toàn thế giới.</p>",
                questions: [
                    {
                        id: 1,
                        text: "Originally named the <strong>[1]</strong>,",
                        type: "text",
                        correct: "Magic Cube",
                        explanation: "<strong>Từ khóa:</strong> Originally named.<br><br><strong>Trong bài (Đoạn 1):</strong> \"...he began the preliminary work on an invention that he called the <strong>'Magic Cube'</strong>.\""
                    },
                    {
                        id: 2,
                        text: "Rubik's Cube consists of a number of smaller cubes organised in <strong>[2]</strong>.",
                        type: "text",
                        correct: "layers",
                        explanation: "<strong>Từ khóa:</strong> number of smaller cubes organised in.<br><br><strong>Trong bài (Đoạn 3):</strong> \"His design consisted of a cube made up of <strong>layers</strong> of individual smaller cubes...\""
                    },
                    {
                        id: 3,
                        text: "The smaller cubes can be twisted in almost any way, though not <strong>[3]</strong>.",
                        type: "text",
                        correct: "diagonally",
                        explanation: "<strong>Từ khóa:</strong> twisted in almost any way, though not.<br><br><strong>Trong bài (Đoạn 3):</strong> \"...each smaller cube could be turned in any direction except <strong>diagonally</strong>.\""
                    },
                    {
                        id: 4,
                        text: "The Cube's <strong>[4]</strong> is shaped in a way that allows the smaller cubes to move smoothly.",
                        type: "text",
                        correct: "rounded interior",
                        explanation: "<strong>Từ khóa:</strong> shaped in a way, allows the smaller cubes to move smoothly.<br><br><strong>Trong bài (Đoạn 3):</strong> \"...by assembling them using a <strong>rounded interior</strong>. This permitted them to move smoothly and easily.\"<br>(Lưu ý: đáp án 'interior' cũng có thể được chấp nhận, tuy nhiên 'rounded interior' mô tả đầy đủ nhất cách hình dạng lõi bên trong giúp khối Rubik di chuyển)."
                    },
                    {
                        id: 5,
                        text: "Each side of the smaller cubes has a different colour, and the aim of the puzzle is to organise the cubes so that the colours on the sides of the large cube are <strong>[5]</strong>.",
                        type: "text",
                        correct: "identical",
                        explanation: "<strong>Từ khóa:</strong> aim of the puzzle, colours on the sides of the large cube.<br><br><strong>Trong bài (Đoạn 3):</strong> \"The object was to twist the layers of small cubes so that each side of the large cube was an <strong>identical</strong> colour.\""
                    },
                    {
                        id: 6,
                        text: "The manufacturers of the puzzle changed the name of the Cube to the name of its <strong>[6]</strong>.",
                        type: "text",
                        correct: "inventor",
                        explanation: "<strong>Từ khóa:</strong> manufacturers, changed the name, to the name of its.<br><br><strong>Trong bài (Đoạn 4):</strong> \"Ideal Toys renamed the Cube after the toy’s <strong>inventor</strong>...\""
                    },
                    {
                        id: 7,
                        text: "It has now sold more than any other <strong>[7]</strong> in the world.",
                        type: "text",
                        correct: "puzzle",
                        explanation: "<strong>Từ khóa:</strong> sold more than any other, in the world.<br><br><strong>Trong bài (Đoạn 4):</strong> \"Rubik’s Cube is believed to be the world’s best-selling <strong>puzzle</strong>; since its invention, more than 300 million Cubes have been sold worldwide.\""
                    }
                ]
            }
        ];

        const state = {
            answers: {},
            isSubmitted: false,
            score: 0,
            incorrectIds: [],
            startTime: Date.now(),
            endTime: null,
            submitTime: null,
            currentPartIndex: 0,
            showPassageTranslation: false,
            expandedExplanations: {},
            expandedNotes: {},
            showResetConfirm: false,
            hasCapturedScreenshot: false,
            showCompletedModal: false,
            // Quản lý format và ghi chú
            notes: {},
            formattedPassage: null,
            formattedPassageTrans: null,
            formattedQuestions: {}
        };

        const totalQuestions = quizData.reduce((acc, curr) => acc + curr.questions.length, 0);
        const allQuestions = quizData.flatMap(s => s.questions);

        // Lưu lại format HTML trước khi re-render
        window.saveFormatting = () => {
            const passageEl = document.getElementById('passage-content');
            if (passageEl) {
                if (state.showPassageTranslation) {
                    state.formattedPassageTrans = passageEl.innerHTML;
                } else {
                    state.formattedPassage = passageEl.innerHTML;
                }
            }
            allQuestions.forEach(q => {
                const qEl = document.getElementById(`q-text-${q.id}`);
                if (qEl) {
                    state.formattedQuestions[q.id] = qEl.innerHTML;
                }
            });
        };

        // Hàm thực thi format (được gọi từ toolbar)
        window.formatText = (command, value = null) => {
            // Bật chế độ chỉnh sửa trong tíc tắc để áp dụng màu/format
            const targets = document.querySelectorAll('.format-target');
            targets.forEach(t => t.setAttribute('contenteditable', 'true'));

            document.execCommand(command, false, value);

            // Tắt ngay lập tức để khóa hoàn toàn khả năng gõ phím
            targets.forEach(t => t.setAttribute('contenteditable', 'false'));

            saveFormatting();
        };

        // Quản lý nhập Note
        window.handleNoteChange = (qId, val) => {
            state.notes[qId] = val;
        };

        window.generateInputHtml = (q, isAnswered, isCorrect, userAnswer) => {
            let inputClass = `inline-block w-28 md:w-36 px-2 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 text-center text-[15px] shadow-sm `;
            let feedbackIcon = '';

            const showFeedback = state.isSubmitted && state.hasCapturedScreenshot;

            if (!state.isSubmitted) {
                inputClass += isAnswered ? 'border-indigo-500 bg-indigo-50 text-indigo-700 focus:ring-indigo-200' : 'border-slate-300 bg-white focus:border-indigo-500 focus:ring-indigo-200';
            } else if (!showFeedback) {
                // Trạng thái đã nộp nhưng chưa chụp ảnh (chưa xem đáp án)
                inputClass += 'border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed';
            } else {
                // Trạng thái đã xem đáp án
                if (isCorrect) {
                    inputClass += 'border-green-500 bg-green-50 text-green-700';
                    feedbackIcon = `<i class="fa-solid fa-circle-check text-green-500 text-lg absolute -right-6 top-1/2 mt-0.5 -translate-y-1/2"></i>`;
                } else {
                    inputClass += 'border-red-500 bg-red-50 text-red-700';
                    feedbackIcon = `<i class="fa-solid fa-circle-xmark text-red-500 text-lg absolute -right-6 top-1/2 mt-0.5 -translate-y-1/2"></i>`;
                }
            }

            return `
                <span class="font-bold text-indigo-700 mr-1">[${q.id}]</span>
                <input type="text" 
                    class="${inputClass}" 
                    placeholder="" 
                    value="${userAnswer}" 
                    ${state.isSubmitted ? 'disabled' : ''}
                    oninput="handleInputChange(${q.id}, this.value)"
                    autocomplete="off" spellcheck="false"
                >
                ${feedbackIcon}
            `;
        };

        window.restoreInputs = () => {
            allQuestions.forEach(q => {
                const wrapper = document.getElementById(`input-wrap-${q.id}`);
                if (wrapper) {
                    const userAnswer = state.answers[q.id] || '';
                    const isAnswered = userAnswer.trim() !== '';
                    const isCorrect = state.isSubmitted && userAnswer.toLowerCase().trim() === q.correct.toLowerCase().trim();
                    wrapper.innerHTML = window.generateInputHtml(q, isAnswered, isCorrect, userAnswer);
                }
            });
        };

        function renderApp() {
            const app = document.getElementById('app');
            const answeredCount = Object.keys(state.answers).filter(k => state.answers[k].toString().trim() !== '').length;
            const currentSection = quizData[state.currentPartIndex];

            // Lưu vị trí cuộn
            const qContainer = document.getElementById('questions-container');
            const scrollPos = qContainer ? qContainer.scrollTop : 0;

            // Tính toán thời gian
            let timeStr = "";
            let dateStr = "";
            if (state.isSubmitted && state.submitTime) {
                const totalSeconds = Math.floor((state.endTime - state.startTime) / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timeStr = `${minutes} phút ${seconds} giây`;

                const d = state.submitTime;
                const hours = String(d.getHours()).padStart(2, '0');
                const mins = String(d.getMinutes()).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                dateStr = `${hours}:${mins} - ${day}/${month}/${year}`;
            }

            let passageHtml = state.showPassageTranslation
                ? (state.formattedPassageTrans || currentSection.passageTranslation)
                : (state.formattedPassage || currentSection.passage);

            let html = `
                <!-- Header -->
                <div id="main-header" class="flex-none bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex justify-between items-center z-30">
                    <div>
                        <h1 class="text-xl font-bold text-indigo-700 flex items-center gap-2">
                            <i class="fa-brands fa-discourse text-indigo-600"></i>
                            IELTS READING PRACTICE
                        </h1>
                        <p class="text-sm text-slate-500">Mô phỏng đề thi IELTS Reading</p>
                    </div>
                    ${!state.isSubmitted ? `
                    <div id="progress-text-container" class="text-sm font-medium bg-indigo-50 text-indigo-800 px-3 py-1 rounded-full border border-indigo-200 hidden md:block">
                        <span id="progress-text">Đã làm: ${answeredCount} / ${totalQuestions}</span>
                    </div>
                    ` : `
                    <div class="text-sm font-bold bg-green-100 text-green-800 px-4 py-2 rounded-full border border-green-300 flex items-center gap-2">
                        <i class="fa-solid fa-award"></i> Điểm: ${state.score} / ${totalQuestions}
                    </div>
                    `}
                </div>

                <!-- Main Body -->
                <div class="flex-1 flex flex-col min-h-0 w-full max-w-[1600px] mx-auto px-2 md:px-6 py-1.5 md:py-2 gap-2">
                    
                    ${state.isSubmitted && state.hasCapturedScreenshot ? `
                    <div class="flex-none bg-white p-5 md:p-6 rounded-xl border border-green-200 shadow-sm animate-in fade-in duration-500 mb-2">
                        <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
                            <div class="flex items-center gap-4">
                                <i class="fa-solid fa-circle-check text-green-500 text-4xl md:text-5xl"></i>
                                <div>
                                    <h2 class="text-xl md:text-2xl font-bold text-slate-800">Hoàn thành bài thi!</h2>
                                    <p class="text-slate-600 mt-1">Tuyệt vời, bạn đã hoàn thành bài tập. Hãy xem kết quả chi tiết bên dưới.</p>
                                </div>
                            </div>
                            <button onclick="resetQuiz()" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow font-medium whitespace-nowrap">
                                <i class="fa-solid fa-rotate-right mr-2"></i>Làm lại bài thi
                            </button>
                        </div>
                        
                        <div class="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                            <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-200">
                                <div class="p-4 flex justify-between items-center">
                                    <span class="text-slate-600 font-medium"><i class="fa-regular fa-clock text-indigo-500 mr-2"></i>Giờ, ngày nộp:</span>
                                    <span class="font-bold text-slate-800">${dateStr}</span>
                                </div>
                                <div class="p-4 flex justify-between items-center">
                                    <span class="text-slate-600 font-medium"><i class="fa-solid fa-stopwatch text-indigo-500 mr-2"></i>Tổng thời gian làm:</span>
                                    <span class="font-bold text-slate-800">${timeStr}</span>
                                </div>
                                <div class="p-4 flex justify-between items-center bg-green-50/50">
                                    <span class="text-green-700 font-medium"><i class="fa-solid fa-check text-green-600 mr-2"></i>Số câu đúng:</span>
                                    <span class="font-bold text-green-700 text-lg">${state.score} / ${totalQuestions}</span>
                                </div>
                                <div class="p-4 flex justify-between items-center ${state.incorrectIds.length > 0 ? 'bg-red-50/50' : 'bg-slate-50'}">
                                    <span class="${state.incorrectIds.length > 0 ? 'text-red-700' : 'text-slate-600'} font-medium"><i class="fa-solid fa-xmark text-red-500 mr-2"></i>Số câu sai/chưa làm:</span>
                                    <span class="font-bold ${state.incorrectIds.length > 0 ? 'text-red-700' : 'text-slate-800'} text-lg">${state.incorrectIds.length} / ${totalQuestions}</span>
                                </div>
                            </div>
                            ${state.incorrectIds.length > 0 ? `
                            <div class="p-4 border-t border-slate-200 bg-white">
                                <span class="text-slate-600 font-medium block mb-3"><i class="fa-solid fa-circle-exclamation text-amber-500 mr-2"></i>Các câu sai hoặc chưa trả lời:</span>
                                <div class="flex flex-wrap gap-2">
                                    ${state.incorrectIds.map(id => `<button onclick="scrollToQuestion(${id})" class="px-4 py-1.5 bg-red-50 text-red-700 font-bold rounded-md border border-red-200 hover:bg-red-100 transition shadow-sm">Câu ${id}</button>`).join('')}
                                </div>
                            </div>
                            ` : `
                            <div class="p-4 border-t border-slate-200 bg-white text-center">
                                <span class="text-green-600 font-bold"><i class="fa-solid fa-star text-yellow-400 mr-1"></i> Xuất sắc! Bạn đã trả lời đúng tất cả các câu hỏi.</span>
                            </div>
                            `}
                        </div>
                    </div>
                    ` : ''}

                    <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-0 relative">
                        <div class="flex-none bg-slate-50 px-3 py-2.5 md:px-4 md:py-3 border-b border-slate-200 flex justify-between items-center">
                            <div class="flex-1 pr-4">
                                <h2 class="text-sm md:text-base font-bold text-indigo-900">${currentSection.title}</h2>
                                ${currentSection.instruction ? `<p class="text-xs md:text-sm text-slate-700 mt-1 font-medium bg-yellow-50 border-l-4 border-yellow-400 pl-3 py-1">${currentSection.instruction}</p>` : ''}
                            </div>
                            <div class="flex-none flex items-center gap-3">
                                <button onclick="togglePassageTranslation()" class="text-xs font-bold px-3 py-1.5 rounded-md shadow-sm transition-colors ${state.showPassageTranslation ? 'bg-indigo-100 text-indigo-700 border border-indigo-200' : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50'}">
                                    <i class="fa-solid fa-language mr-1"></i> ${state.showPassageTranslation ? 'Đang bật dịch' : 'Bật dịch VN'}
                                </button>
                            </div>
                        </div>

                        <!-- Formatting Toolbar -->
                        <div class="flex-none bg-white border-b border-slate-200 px-3 py-1.5 flex items-center gap-1 md:gap-2 z-40 text-sm overflow-x-auto custom-scrollbar shadow-sm">

                } else {
                    containerClass += 'bg-slate-50 border-slate-200 opacity-80';

            } else {
                containerClass += isAnswered ? 'bg-slate-50 border-indigo-200' : 'bg-white border-slate-200 hover:border-slate-300';

                        ${showExp ? `

                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            let headingHtml = q.heading ? `
                <div class="${idx !== 0 ? 'mt-8' : ''} mb-4 format-target" contenteditable="false">

                if (submitBtnNav) {
                    submitBtnNav.disabled = true;
                    submitBtnNav.className = "opacity-50 px-4 py-1 bg-indigo-600 text-white text-xs md:text-sm font-bold rounded shadow cursor-not-allowed";
                }
            }

            allQuestions.forEach(q => {
                const btn = document.getElementById(`nav-btn-${q.id}`);
                const isAnswered = state.answers[q.id] && state.answers[q.id].toString().trim() !== '';

                if (btn && !state.isSubmitted) {
                    btn.className = isAnswered
                        ? "shrink-0 w-7 h-7 md:w-8 md:h-8 rounded text-xs md:text-sm font-bold flex items-center justify-center transition-all border cursor-pointer bg-indigo-600 text-white border-indigo-600 shadow-sm"
                        : "shrink-0 w-7 h-7 md:w-8 md:h-8 rounded text-xs md:text-sm font-bold flex items-center justify-center transition-all border cursor-pointer bg-slate-50 text-slate-600 border-slate-300 hover:bg-slate-200";
                }

                const wrapper = document.getElementById(`input-wrap-${q.id}`);
                if (wrapper) {
                    const inputEl = wrapper.querySelector('input');
                    if (inputEl && !state.isSubmitted) {
                        if (isAnswered) {
                            inputEl.className = "inline-block w-28 md:w-36 px-2 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 text-center text-[15px] shadow-sm border-indigo-500 bg-indigo-50 text-indigo-700 focus:ring-indigo-200";
                        } else {
                            inputEl.className = "inline-block w-28 md:w-36 px-2 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 text-center text-[15px] shadow-sm border-slate-300 bg-white focus:border-indigo-500 focus:ring-indigo-200";
                        }
                    }
                }

                const container = document.getElementById(`question-${q.id}`);
                if (container && !state.isSubmitted) {
                    container.className = `p-4 md:p-5 rounded-xl border transition-all ${isAnswered ? 'bg-slate-50 border-indigo-200' : 'bg-white border-slate-200 hover:border-slate-300'}`;
                }
            });
        };

        window.handleInputChange = (qId, val) => {
            if (state.isSubmitted) return;
            state.answers[qId] = val;
            updateProgress();
        };

        window.calculateScore = () => {
            saveFormatting();
            let currentScore = 0;
            let incorrectIds = [];
            quizData.forEach(section => {
                section.questions.forEach(q => {
                    const userAnswer = (state.answers[q.id] || "").toString().toLowerCase().trim();
                    const correctAnswer = q.correct.toString().toLowerCase().trim();
                    if (userAnswer === correctAnswer) {
                        currentScore += 1;
                    } else {
                        incorrectIds.push(q.id);
                    }
                });
            });
            state.score = currentScore;
            state.incorrectIds = incorrectIds;
            state.endTime = Date.now();
            state.submitTime = new Date();
            state.isSubmitted = true;
            state.showCompletedModal = true;
            renderApp();
        };

        window.captureAndReveal = () => {
            const captureArea = document.getElementById('capture-area');
            const btn = document.getElementById('capture-btn');
            const btnText = document.getElementById('capture-btn-text');

            if (!captureArea || !btn) return;

            // Khoá nút bấm ngay lập tức nhưng CHỈ đổi text để tránh vỡ icon
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            const originalText = btnText.innerText;
            btnText.innerText = 'Đang xử lý...';

            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 3,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false,
                    onclone: function (clonedDoc) {
                        // Trả lại text gốc cho nút trong ảnh chụp
                        const clonedBtnText = clonedDoc.getElementById('capture-btn-text');
                        const clonedBtn = clonedDoc.getElementById('capture-btn');
                        if (clonedBtnText) clonedBtnText.innerText = originalText;
                        if (clonedBtn) {
                            clonedBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                            clonedBtn.style.opacity = '1';
                        }

                        // LOẠI BỎ TOÀN BỘ KHUNG, ĐƯỜNG VIỀN, BÓNG ĐỔ KHỎI HÌNH CHỤP

                        // 1. Viền ngoài cùng của Card
                        const clonedArea = clonedDoc.getElementById('capture-area');
                        if (clonedArea) {
                            clonedArea.style.transform = 'none';
                            clonedArea.style.boxShadow = 'none';
                            clonedArea.style.border = 'none';
                        }

                        // 2. Viền bọc tên bài thi
                        const clonedTitleBox = clonedDoc.getElementById('title-box');
                        if (clonedTitleBox) {
                            clonedTitleBox.style.border = 'none';
                            clonedTitleBox.style.background = 'transparent';
                            clonedTitleBox.style.boxShadow = 'none';
                            clonedTitleBox.style.padding = '0';
                        }

                        // 3. Viền bọc tất cả các thông số (stats)
                        const clonedStatsBox = clonedDoc.getElementById('stats-box');
                        if (clonedStatsBox) {
                            clonedStatsBox.style.border = 'none';
                            clonedStatsBox.style.background = 'transparent';
                            clonedStatsBox.style.boxShadow = 'none';
                        }

                        // 4. Viền bọc các câu sai
                        const clonedWrongBox = clonedDoc.getElementById('wrong-answers-box');
                        if (clonedWrongBox) {
                            clonedWrongBox.style.border = 'none';
                            clonedWrongBox.style.background = 'transparent';
                            clonedWrongBox.style.boxShadow = 'none';
                        }

                        // 5. Các viền bo vuông nhỏ ở từng chỉ số (Ngày giờ, Thời gian, Câu 1, Câu 2...)
                        const valueBoxes = clonedDoc.querySelectorAll('.value-box, .wrong-q-box');
                        valueBoxes.forEach(box => {
                            box.style.border = 'none';
                            box.style.background = 'transparent';
                            box.style.boxShadow = 'none';
                            // Xóa luôn padding để chữ biến thành văn bản liền mạch (flat text)
                            box.style.padding = '0';
                            box.style.margin = '0';

                            // Căn lại khoảng cách sau khi xoá hộp cho tự nhiên
                            if (box.classList.contains('wrong-q-box')) {
                                box.style.marginRight = '10px';
                                box.style.color = '#dc2626'; // Đỏ (đảm bảo không bị mất màu)
                            } else {
                                box.style.color = '#1e293b'; // Đen xám
                            }
                        });
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Ket_qua_IELTS_Reading_${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    state.hasCapturedScreenshot = true;
                    state.showCompletedModal = false;
                    renderApp();

                }).catch(err => {
                    console.error("Lỗi khi chụp ảnh:", err);
                    alert("Có lỗi xảy ra khi lưu ảnh. Bạn có thể xem đáp án ngay.");
                    state.hasCapturedScreenshot = true;
                    state.showCompletedModal = false;
                    renderApp();
                });
            }, 50);
        };

        window.resetQuiz = () => {
            state.showResetConfirm = true;
            renderApp();
        };

        window.cancelReset = () => {
            state.showResetConfirm = false;
            renderApp();
        };

        window.confirmReset = () => {
            state.answers = {};
            state.isSubmitted = false;
            state.score = 0;
            state.incorrectIds = [];
            state.startTime = Date.now();
            state.endTime = null;
            state.submitTime = null;
            state.expandedExplanations = {};
            state.showResetConfirm = false;
            state.hasCapturedScreenshot = false;
            state.showCompletedModal = false;
            // Xoá định dạng & ghi chú
            state.notes = {};
            state.formattedPassage = null;
            state.formattedPassageTrans = null;
            state.formattedQuestions = {};

            renderApp();
        };

        window.togglePassageTranslation = () => {
            saveFormatting();
            state.showPassageTranslation = !state.showPassageTranslation;
            renderApp();
        };

        window.toggleExplanation = (qId) => {
            saveFormatting();
            state.expandedExplanations[qId] = !state.expandedExplanations[qId];
            renderApp();
        };

        window.toggleNote = (qId) => {
            saveFormatting();
            state.expandedNotes[qId] = !state.expandedNotes[qId];
            renderApp();
        };

        window.performScroll = (id) => {
            const container = document.getElementById('questions-container');
            const el = document.getElementById(`question-${id}`);

            if (container && el) {
                const containerTop = container.getBoundingClientRect().top;
                const elTop = el.getBoundingClientRect().top;
                const currentScroll = container.scrollTop;
                const targetScroll = currentScroll + (elTop - containerTop) - 20;

                container.scrollTo({ top: targetScroll, behavior: "smooth" });

                const wrapper = document.getElementById(`input-wrap-${id}`);
                if (wrapper) {
                    const inputEl = wrapper.querySelector('input');
                    if (inputEl) {
                        inputEl.focus();
                        inputEl.classList.add('bg-indigo-100', 'border-indigo-500');
                        setTimeout(() => inputEl.classList.remove('bg-indigo-100', 'border-indigo-500'), 1000);
                    }
                }
            }
        };

        window.scrollToQuestion = (id) => {
            performScroll(id);
        };

        renderApp();

    </script>
</body>

</html>
