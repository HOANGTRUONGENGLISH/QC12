<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS READING - MATCHING INFORMATION - GRAPHIC NOVELS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2canvas cho tính năng chụp màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* CSS cho thanh cuộn */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        #passage-container::-webkit-scrollbar,
        #questions-container::-webkit-scrollbar {
            width: 8px;
        }

        #passage-container::-webkit-scrollbar-track,
        #questions-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #passage-container::-webkit-scrollbar-thumb,
        #questions-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
            border: 2px solid white;
        }

        /* Đảm bảo các thẻ định dạng văn bản hoạt động tốt cùng Tailwind */
        #app b,
        #app strong {
            font-weight: bolder;
        }

        #app i,
        #app em {
            font-style: italic;
        }

        #app u {
            text-decoration: underline;
        }

        #app strike,
        #app s {
            text-decoration: line-through;
        }
    </style>
</head>

<body class="h-screen flex flex-col bg-slate-100 text-slate-800 font-sans overflow-hidden">

    <div id="app" class="flex flex-col h-full w-full relative"></div>

    <script>
        const quizData = [
            {
                title: "IELTS READING - GRAPHIC NOVELS",
                instruction: "The Reading passage has eight paragraphs, A–H. Which paragraph contains the following information? Write the correct letter, A–H. <em>NB You may use any letter more than once.</em>",
                passage: "<h2 class='text-xl md:text-2xl font-bold text-slate-900 mb-2'>Graphic novels</h2><p class='mb-4 font-medium text-slate-700 italic'>People who think graphic novels are just comics with a different name should think again.</p><p class='mb-4'><strong>A</strong> Graphic novels, as the name suggests, are books written and illustrated in the style of a comic book. The term graphic novel was first used in 1978 by author and artist Will Eisner to distinguish a comic novel he had written and illustrated from newspaper comic strips. He described graphic novels as consisting of ‘sequential art’ – a series of illustrations which, when viewed in order, tell a story.</p><p class='mb-4'><strong>B</strong> Although today’s graphic novels are a recent phenomenon, this basic way of telling stories has been used in various forms for centuries. Early cave drawings, hieroglyphics and medieval tapestries are examples of this. The term graphic novel is now generally used to describe any book in a comic format that resembles a novel in length and narrative development.</p><p class='mb-4'><strong>C</strong> Many adults feel that graphic novels are not the type of reading material that will help young people become good readers. They believe that graphic novels are somehow a bad influence that prevent ‘real’ reading. In other words, they think that they are not ‘real’ books.</p><p class='mb-4'><strong>D</strong> However, many quality graphic novels are now being seen as a method of storytelling on the same level as novels, films or audio books. From originally appealing to a small following of enthusiasts, they are now being accepted by librarians and teachers as proper literature for children and young adults. The main advantages are that they promote literacy, and attract and motivate young people to read.</p><p class='mb-4'><strong>E</strong> How do we know this? In the last few years, teachers and school libraries have reported outstanding success getting children to read with graphic novels. Many have mentioned the motivational factor of the graphic novel. This has been especially true with children who are usually reluctant to read, especially boys. The colourful pictures attract them, and then encourage them to find out what the story is about. Providing young people of all abilities with a wide range of reading materials, including graphic novels, can help them become lifelong readers.</p><p class='mb-4'><strong>F</strong> Furthermore, one of the main benefits of a graphic novel is that it can help students who are learning a foreign language, and who are having problems improving their reading skills. This is because the pictures provide clues to the meaning of the words. Language learners are therefore more motivated by graphic novels, and will acquire new vocabulary more quickly.</p><p class='mb-4'><strong>G</strong> Many teachers have reported great success when they have used graphic novels with their students, especially in the areas of English, social studies and art. They have discovered that, just like traditional forms of literature, they can be useful tools for helping students examine aspects of history, science, literature and art.</p><p class='mb-4'><strong>H</strong> The idea that graphic novels are too simple to be regarded as serious reading is no longer valid. The excellent graphic novels available today demand many of the same skills that are needed to understand traditional works of fiction. Often they actually contain more sophisticated vocabulary than traditional books. Reading them can help students develop the skills that are necessary to read more challenging works.</p>",
                passageTranslation: "<h2 class='text-xl md:text-2xl font-bold text-slate-900 mb-2'>Tiểu thuyết đồ họa</h2><p class='mb-4 font-medium text-slate-700 italic'>Những người nghĩ rằng tiểu thuyết đồ họa chỉ là truyện tranh với một cái tên khác nên suy nghĩ lại.</p><p class='mb-4'><strong>A</strong> Tiểu thuyết đồ họa, đúng như tên gọi, là những cuốn sách được viết và minh họa theo phong cách của một cuốn truyện tranh. Thuật ngữ tiểu thuyết đồ họa được sử dụng lần đầu tiên vào năm 1978 bởi tác giả và họa sĩ Will Eisner để phân biệt một cuốn tiểu thuyết truyện tranh mà ông đã viết và minh họa với các dải truyện tranh trên báo. Ông mô tả tiểu thuyết đồ họa bao gồm ‘nghệ thuật tuần tự’ – một chuỗi các hình minh họa mà khi được xem theo thứ tự, sẽ kể một câu chuyện.</p><p class='mb-4'><strong>B</strong> Mặc dù tiểu thuyết đồ họa ngày nay là một hiện tượng gần đây, cách kể chuyện cơ bản này đã được sử dụng dưới nhiều hình thức trong nhiều thế kỷ. Những bức vẽ trong hang động thời kỳ đầu, chữ tượng hình và những tấm thảm trang trí thời trung cổ là những ví dụ về điều này. Thuật ngữ tiểu thuyết đồ họa hiện nay thường được sử dụng để mô tả bất kỳ cuốn sách nào ở định dạng truyện tranh giống với một cuốn tiểu thuyết về độ dài và sự phát triển câu chuyện.</p><p class='mb-4'><strong>C</strong> Nhiều người lớn cảm thấy rằng tiểu thuyết đồ họa không phải là loại tài liệu đọc sẽ giúp những người trẻ tuổi trở thành những người đọc giỏi. Họ tin rằng tiểu thuyết đồ họa bằng cách nào đó là một ảnh hưởng xấu ngăn cản việc đọc ‘thực sự’. Nói cách khác, họ nghĩ rằng chúng không phải là những cuốn sách ‘thực sự’.</p><p class='mb-4'><strong>D</strong> Tuy nhiên, nhiều tiểu thuyết đồ họa chất lượng hiện đang được coi là một phương pháp kể chuyện ở cùng cấp độ với tiểu thuyết, phim ảnh hoặc sách nói. Từ chỗ ban đầu chỉ thu hút một lượng nhỏ những người đam mê, chúng hiện đang được các thủ thư và giáo viên chấp nhận như một tài liệu văn học phù hợp cho trẻ em và thanh thiếu niên. Ưu điểm chính là chúng thúc đẩy khả năng đọc viết, thu hút và tạo động lực cho những người trẻ tuổi đọc sách.</p><p class='mb-4'><strong>E</strong> Làm sao chúng ta biết điều này? Trong vài năm qua, các giáo viên và thư viện trường học đã báo cáo những thành công nổi bật trong việc khuyến khích trẻ em đọc tiểu thuyết đồ họa. Nhiều người đã đề cập đến yếu tố tạo động lực của tiểu thuyết đồ họa. Điều này đặc biệt đúng với những đứa trẻ thường ngại đọc, đặc biệt là các bé trai. Những bức tranh đầy màu sắc thu hút chúng, và sau đó khuyến khích chúng tìm hiểu xem câu chuyện kể về điều gì. Việc cung cấp cho những người trẻ tuổi ở mọi khả năng một loạt các tài liệu đọc, bao gồm cả tiểu thuyết đồ họa, có thể giúp chúng trở thành những người đọc suốt đời.</p><p class='mb-4'><strong>F</strong> Hơn nữa, một trong những lợi ích chính của tiểu thuyết đồ họa là nó có thể giúp học sinh học ngoại ngữ và những người đang gặp vấn đề trong việc cải thiện kỹ năng đọc của mình. Điều này là do các bức tranh cung cấp manh mối về ý nghĩa của các từ. Do đó, người học ngôn ngữ có động lực hơn nhờ tiểu thuyết đồ họa và sẽ tiếp thu từ vựng mới nhanh hơn.</p><p class='mb-4'><strong>G</strong> Nhiều giáo viên đã báo cáo thành công lớn khi họ sử dụng tiểu thuyết đồ họa với học sinh của mình, đặc biệt là trong các lĩnh vực tiếng Anh, nghiên cứu xã hội và nghệ thuật. Họ đã phát hiện ra rằng, giống như các hình thức văn học truyền thống, chúng có thể là những công cụ hữu ích để giúp học sinh kiểm tra các khía cạnh của lịch sử, khoa học, văn học và nghệ thuật.</p><p class='mb-4'><strong>H</strong> Ý tưởng cho rằng tiểu thuyết đồ họa quá đơn giản để được coi là tài liệu đọc nghiêm túc không còn giá trị nữa. Những cuốn tiểu thuyết đồ họa xuất sắc hiện có ngày nay đòi hỏi nhiều kỹ năng tương tự như những kỹ năng cần thiết để hiểu các tác phẩm hư cấu truyền thống. Thường thì chúng thực sự chứa nhiều từ vựng phức tạp hơn sách truyền thống. Việc đọc chúng có thể giúp học sinh phát triển các kỹ năng cần thiết để đọc các tác phẩm thách thức hơn.</p>",
                questions: [
                    {
                        id: 1,
                        text: "<strong>[1]</strong> people with negative attitudes towards graphic novels",
                        type: "text",
                        correct: "C",
                        explanation: "<strong>Từ khóa:</strong> people with negative attitudes, graphic novels.<br><br><strong>Trong bài (Đoạn C):</strong> \"Many adults feel that graphic novels are not the type of reading material that will help young people... they think that they are not 'real' books.\"<br><br><strong>Giải thích:</strong> Đoạn C đề cập đến việc nhiều người lớn tuổi có thái độ tiêu cực, coi tiểu thuyết đồ họa là ảnh hưởng xấu và không phải sách thực sự."
                    },
                    {
                        id: 2,
                        text: "<strong>[2]</strong> a variety of school subjects where graphic novels can play an important role",
                        type: "text",
                        correct: "G",
                        explanation: "<strong>Từ khóa:</strong> variety of school subjects, play an important role.<br><br><strong>Trong bài (Đoạn G):</strong> \"...especially in the areas of English, social studies and art. They have discovered that... they can be useful tools for helping students examine aspects of history, science, literature and art.\"<br><br><strong>Giải thích:</strong> Đoạn G liệt kê một loạt các môn học ở trường (Tiếng Anh, nghiên cứu xã hội, nghệ thuật, lịch sử, khoa học, văn học) mà tiểu thuyết đồ họa có thể đóng vai trò như một công cụ hữu ích."
                    },
                    {
                        id: 3,
                        text: "<strong>[3]</strong> why a graphic novel’s visual element speeds up learning",
                        type: "text",
                        correct: "F",
                        explanation: "<strong>Từ khóa:</strong> visual element, speeds up learning.<br><br><strong>Trong bài (Đoạn F):</strong> \"...the pictures provide clues to the meaning of the words. Language learners are therefore more motivated... and will acquire new vocabulary more quickly.\"<br><br><strong>Giải thích:</strong> Đoạn F giải thích rằng các hình ảnh (visual element) cung cấp manh mối về nghĩa của từ, giúp người học tiếp thu từ vựng mới nhanh hơn (speeds up learning)."
                    },
                    {
                        id: 4,
                        text: "<strong>[4]</strong> a modern definition of graphic novels",
                        type: "text",
                        correct: "B",
                        explanation: "<strong>Từ khóa:</strong> modern definition, graphic novels.<br><br><strong>Trong bài (Đoạn B):</strong> \"The term graphic novel is now generally used to describe any book in a comic format that resembles a novel in length and narrative development.\"<br><br><strong>Giải thích:</strong> Đoạn B cung cấp định nghĩa hiện đại (is now generally used) để mô tả về tiểu thuyết đồ họa."
                    },
                    {
                        id: 5,
                        text: "<strong>[5]</strong> graphic novels are as good as any other method of telling a story",
                        type: "text",
                        correct: "D",
                        explanation: "<strong>Từ khóa:</strong> as good as, any other method of telling a story.<br><br><strong>Trong bài (Đoạn D):</strong> \"...many quality graphic novels are now being seen as a method of storytelling on the same level as novels, films or audio books.\"<br><br><strong>Giải thích:</strong> Đoạn D khẳng định tiểu thuyết đồ họa được xem là phương pháp kể chuyện ở cùng đẳng cấp (on the same level as - as good as) với tiểu thuyết, phim hay sách nói."
                    },
                    {
                        id: 6,
                        text: "<strong>[6]</strong> graphic novels sometimes use advanced words",
                        type: "text",
                        correct: "H",
                        explanation: "<strong>Từ khóa:</strong> sometimes use advanced words.<br><br><strong>Trong bài (Đoạn H):</strong> \"Often they actually contain more sophisticated vocabulary than traditional books.\"<br><br><strong>Giải thích:</strong> Đoạn H chỉ ra rằng tiểu thuyết đồ họa thường chứa các từ vựng phức tạp hơn (sophisticated vocabulary = advanced words) so với sách truyền thống."
                    },
                    {
                        id: 7,
                        text: "<strong>[7]</strong> the historical use of pictures as a method of storytelling",
                        type: "text",
                        correct: "B",
                        explanation: "<strong>Từ khóa:</strong> historical use of pictures, method of storytelling.<br><br><strong>Trong bài (Đoạn B):</strong> \"...this basic way of telling stories has been used in various forms for centuries. Early cave drawings, hieroglyphics and medieval tapestries are examples of this.\"<br><br><strong>Giải thích:</strong> Đoạn B đưa ra các ví dụ về việc sử dụng hình ảnh (bức vẽ hang động, chữ tượng hình, thảm trang trí) như một phương pháp kể chuyện trong lịch sử."
                    }
                ]
            }
        ];

        const state = {
            answers: {},
            isSubmitted: false,
            score: 0,
            incorrectIds: [],
            startTime: Date.now(),
            endTime: null,
            submitTime: null,
            currentPartIndex: 0,
            showPassageTranslation: false,
            expandedExplanations: {},
            expandedNotes: {},
            showResetConfirm: false,
            hasCapturedScreenshot: false,
            showCompletedModal: false,
            notes: {},
            formattedPassage: null,
            formattedPassageTrans: null,
            formattedQuestions: {}
        };

        const totalQuestions = quizData.reduce((acc, curr) => acc + curr.questions.length, 0);
        const allQuestions = quizData.flatMap(s => s.questions);

        // Chuẩn hoá đáp án A, B, C, D...
        window.normalizeAnswer = (ans) => {
            if (!ans) return "";
            return ans.toString().toUpperCase().trim();
        };

        // Lưu lại format HTML trước khi re-render
        window.saveFormatting = () => {
            const passageEl = document.getElementById('passage-content');
            if (passageEl) {
                if (state.showPassageTranslation) {
                    state.formattedPassageTrans = passageEl.innerHTML;
                } else {
                    state.formattedPassage = passageEl.innerHTML;
                }
            }
            allQuestions.forEach(q => {
                const qEl = document.getElementById(`q-text-${q.id}`);
                if (qEl) {
                    state.formattedQuestions[q.id] = qEl.innerHTML;
                }
            });
        };

        // Hàm thực thi format (được gọi từ toolbar)
        window.formatText = (command, value = null) => {
            const targets = document.querySelectorAll('.format-target');
            targets.forEach(t => t.setAttribute('contenteditable', 'true'));

            document.execCommand(command, false, value);

            targets.forEach(t => t.setAttribute('contenteditable', 'false'));
            saveFormatting();
        };

        window.handleNoteChange = (qId, val) => {
            state.notes[qId] = val;
        };

        window.generateInputHtml = (q, isAnswered, isCorrect, userAnswer) => {
            let inputClass = `inline-block w-[80px] md:w-[90px] px-1 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 cursor-pointer text-[13px] md:text-[14px] shadow-sm `;
            let feedbackIcon = '';

            const showFeedback = state.isSubmitted && state.hasCapturedScreenshot;

            if (!state.isSubmitted) {
                inputClass += isAnswered ? 'border-indigo-500 bg-indigo-50 text-indigo-700 focus:ring-indigo-200' : 'border-slate-300 bg-white focus:border-indigo-500 focus:ring-indigo-200';
            } else if (!showFeedback) {
                inputClass += 'border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed';
            } else {
                if (isCorrect) {
                    inputClass += 'border-green-500 bg-green-50 text-green-700';
                    feedbackIcon = `<i class="fa-solid fa-circle-check text-green-500 text-lg absolute -right-6 top-1/2 mt-0.5 -translate-y-1/2"></i>`;
                } else {
                    inputClass += 'border-red-500 bg-red-50 text-red-700';
                    feedbackIcon = `<i class="fa-solid fa-circle-xmark text-red-500 text-lg absolute -right-6 top-1/2 mt-0.5 -translate-y-1/2"></i>`;
                }
            }

            let normalizedUserAns = userAnswer.trim().toUpperCase();

            // Thay đổi danh sách tùy chọn cho phù hợp bài Matching A-H
            const options = [
                { value: "", label: "--" },
                { value: "A", label: "A" },
                { value: "B", label: "B" },
                { value: "C", label: "C" },
                { value: "D", label: "D" },
                { value: "E", label: "E" },
                { value: "F", label: "F" },
                { value: "G", label: "G" },
                { value: "H", label: "H" }
            ];

            const optionsHtml = options.map(opt =>
                `<option value="${opt.value}" ${normalizedUserAns === opt.value ? 'selected' : ''}>${opt.label}</option>`
            ).join('');

            return `
                <span class="font-bold text-indigo-700 mr-1 hidden">[${q.id}]</span>
                <select 
                    class="${inputClass}" 
                    style="text-align-last: center;"
                    ${state.isSubmitted ? 'disabled' : ''}
                    onchange="handleInputChange(${q.id}, this.value)"
                >
                    ${optionsHtml}
                </select>
                ${feedbackIcon}
            `;
        };

        window.restoreInputs = () => {
            allQuestions.forEach(q => {
                const wrapper = document.getElementById(`input-wrap-${q.id}`);
                if (wrapper) {
                    const userAnswer = state.answers[q.id] || '';
                    const isAnswered = userAnswer.trim() !== '';
                    const isCorrect = state.isSubmitted && window.normalizeAnswer(userAnswer) === window.normalizeAnswer(q.correct);
                    wrapper.innerHTML = window.generateInputHtml(q, isAnswered, isCorrect, userAnswer);
                }
            });
        };

        function renderApp() {
            const app = document.getElementById('app');
            const answeredCount = Object.keys(state.answers).filter(k => state.answers[k].toString().trim() !== '').length;
            const currentSection = quizData[state.currentPartIndex];

            const qContainer = document.getElementById('questions-container');
            const scrollPos = qContainer ? qContainer.scrollTop : 0;

            let timeStr = "";
            let dateStr = "";
            if (state.isSubmitted && state.submitTime) {
                const totalSeconds = Math.floor((state.endTime - state.startTime) / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timeStr = `${minutes} phút ${seconds} giây`;

                const d = state.submitTime;
                const hours = String(d.getHours()).padStart(2, '0');
                const mins = String(d.getMinutes()).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                dateStr = `${hours}:${mins} - ${day}/${month}/${year}`;
            }

            let passageHtml = state.showPassageTranslation
                ? (state.formattedPassageTrans || currentSection.passageTranslation)
                : (state.formattedPassage || currentSection.passage);

            let html = `
                <!-- Header -->
                <div id="main-header" class="flex-none bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex justify-between items-center z-30">
                    <div>
                        <h1 class="text-xl font-bold text-indigo-700 flex items-center gap-2">
                            <i class="fa-brands fa-discourse text-indigo-600"></i>
                            IELTS READING PRACTICE
                        </h1>
                        <p class="text-sm text-slate-500">Mô phỏng đề thi IELTS Reading</p>
                    </div>
                    ${!state.isSubmitted ? `
                    <div id="progress-text-container" class="text-sm font-medium bg-indigo-50 text-indigo-800 px-3 py-1 rounded-full border border-indigo-200 hidden md:block">

                explanationHtml = `
                    <div class="mt-5 border-t border-slate-200/80 pt-4">
                        <button onclick="toggleExplanation(${q.id})" class="flex items-center gap-2 text-sm font-bold transition-colors ${showExp ? 'text-indigo-700' : 'text-indigo-600 hover:text-indigo-800'}">
                            <i class="fa-solid fa-book-open"></i>
                            ${showExp ? 'Ẩn giải thích' : 'Xem giải thích chi tiết'}
                            <i class="fa-solid ${showExp ? 'fa-chevron-up' : 'fa-chevron-down'} ml-1"></i>
                        </button>
                        
                        ${showExp ? `
                        <div class="mt-4 bg-indigo-50/70 p-4 md:p-5 rounded-xl border border-indigo-100 text-sm text-slate-800 shadow-inner">
                            <div class="whitespace-pre-wrap leading-relaxed text-justify">${q.explanation}</div>
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            const showNote = state.expandedNotes[q.id];
            const hasNote = state.notes[q.id] && state.notes[q.id].trim() !== '';

            let notesHtml = `
                <div class="absolute top-3 right-3 z-10 flex flex-col items-end">
                    <button onclick="toggleNote(${q.id})" class="text-slate-400 hover:text-amber-500 transition-colors p-1.5 rounded-md hover:bg-slate-100 relative" title="Ghi chú của giáo viên">
                        <i class="fa-solid fa-comment-dots text-xl ${hasNote ? 'text-amber-500' : ''}"></i>
                        ${hasNote ? '<span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>' : ''}
                    </button>
                    
                    ${showNote ? `
                    <div class="mt-2 bg-amber-50 border border-amber-200 rounded-xl p-3 shadow-xl w-64 md:w-80 relative animate-in fade-in slide-in-from-top-2 duration-200 z-50">
                        <div class="absolute -top-2 right-3 w-4 h-4 bg-amber-50 border-t border-l border-amber-200 transform rotate-45"></div>
                        <div class="relative z-10">
                            <div class="text-xs font-bold text-amber-800 mb-2 flex items-center justify-between uppercase tracking-wider">
                                <span><i class="fa-solid fa-pen-clip mr-1"></i> Ghi chú riêng</span>
                                <button onclick="toggleNote(${q.id})" class="text-amber-600 hover:text-amber-800 bg-amber-100 hover:bg-amber-200 rounded-full w-5 h-5 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            <textarea 
                                class="w-full bg-white border border-amber-300 rounded p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 min-h-[90px] custom-scrollbar text-slate-700 transition-all shadow-inner" 
                                placeholder="Nhập ghi chú, phân tích câu hỏi tại đây..."
                                oninput="handleNoteChange(${q.id}, this.value)"
                            >${state.notes[q.id] || ''}</textarea>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            let headingHtml = q.heading ? `
                <div class="${idx !== 0 ? 'mt-8' : ''} mb-4 format-target" contenteditable="false">
                    <h3 class="text-[17px] font-bold text-slate-800 border-b-2 border-indigo-100 pb-2 outline-none">${q.heading}</h3>
                </div>
            ` : '';

            // Lồng Wrapper
            let rawText = "";
            if (state.formattedQuestions[q.id]) {
                rawText = state.formattedQuestions[q.id];
            } else {
                const regex = new RegExp(`<strong>\\[${q.id}\\]<\\/strong>|\\[${q.id}\\]`);
                rawText = q.text.replace(regex, `<span id="input-wrap-${q.id}" class="relative inline-block align-middle whitespace-nowrap" contenteditable="false"></span>`);
            }

            let questionTextHtml = `
                <div class="flex items-start gap-2.5 md:gap-3 pr-8">
                    <div class="mt-2 w-1.5 h-1.5 rounded-full bg-slate-500 shrink-0 mt-1.5"></div>
                    <div id="q-text-${q.id}" class="format-target text-slate-800 mb-0 text-[15px] md:text-base leading-relaxed text-justify w-full outline-none focus:outline-none" contenteditable="false">
                        ${rawText}
                    </div>
                </div>
            `;

            return `
                ${headingHtml}
                <div id="question-${q.id}" class="${containerClass}">
                    <div class="w-full">
                        ${questionTextHtml}
                        ${errorHtml}
                        ${explanationHtml}
                        ${notesHtml}
                    </div>
                </div>
            `;
        }

        window.updateProgress = () => {
            const answeredCount = Object.keys(state.answers).filter(k => state.answers[k].toString().trim() !== '').length;

            const progressText = document.getElementById('progress-text');
            if (progressText) progressText.innerText = `Đã làm: ${answeredCount} / ${totalQuestions}`;

            const submitBtnMain = document.getElementById('submit-btn-main');
            const submitBtnNav = document.getElementById('submit-btn-nav');

            if (answeredCount > 0) {
                if (submitBtnMain) {
                    submitBtnMain.disabled = false;
                    submitBtnMain.className = "px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all flex items-center gap-2 text-lg";
                }
                if (submitBtnNav) {
                    submitBtnNav.disabled = false;
                    submitBtnNav.className = "px-4 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs md:text-sm font-bold rounded shadow transition-colors";
                }
            } else {
                if (submitBtnMain) {
                    submitBtnMain.disabled = true;
                    submitBtnMain.className = "opacity-50 px-8 py-3.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg flex items-center gap-2 text-lg cursor-not-allowed";
                }
                if (submitBtnNav) {
                    submitBtnNav.disabled = true;
                    submitBtnNav.className = "opacity-50 px-4 py-1 bg-indigo-600 text-white text-xs md:text-sm font-bold rounded shadow cursor-not-allowed";
                }
            }

            allQuestions.forEach(q => {
                const btn = document.getElementById(`nav-btn-${q.id}`);
                const isAnswered = state.answers[q.id] && state.answers[q.id].toString().trim() !== '';

                if (btn && !state.isSubmitted) {
                    btn.className = isAnswered
                        ? "shrink-0 w-7 h-7 md:w-8 md:h-8 rounded text-xs md:text-sm font-bold flex items-center justify-center transition-all border cursor-pointer bg-indigo-600 text-white border-indigo-600 shadow-sm"
                        : "shrink-0 w-7 h-7 md:w-8 md:h-8 rounded text-xs md:text-sm font-bold flex items-center justify-center transition-all border cursor-pointer bg-slate-50 text-slate-600 border-slate-300 hover:bg-slate-200";
                }

                const wrapper = document.getElementById(`input-wrap-${q.id}`);
                if (wrapper) {
                    const inputEl = wrapper.querySelector('select');
                    if (inputEl && !state.isSubmitted) {
                        if (isAnswered) {
                            inputEl.className = "inline-block w-[80px] md:w-[90px] px-1 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 cursor-pointer text-[13px] md:text-[14px] shadow-sm border-indigo-500 bg-indigo-50 text-indigo-700 focus:ring-indigo-200";
                        } else {
                            inputEl.className = "inline-block w-[80px] md:w-[90px] px-1 py-1 mx-1 border-2 rounded-md focus:outline-none focus:ring-2 transition-all font-bold text-slate-800 cursor-pointer text-[13px] md:text-[14px] shadow-sm border-slate-300 bg-white focus:border-indigo-500 focus:ring-indigo-200";
                        }
                    }
                }

                const container = document.getElementById(`question-${q.id}`);
                if (container && !state.isSubmitted) {
                    container.className = `p-4 md:p-5 rounded-xl border transition-all ${isAnswered ? 'bg-slate-50 border-indigo-200' : 'bg-white border-slate-200 hover:border-slate-300'}`;
                }
            });
        };

        window.handleInputChange = (qId, val) => {
            if (state.isSubmitted) return;
            state.answers[qId] = val;
            updateProgress();
        };

        window.calculateScore = () => {
            saveFormatting();
            let currentScore = 0;
            let incorrectIds = [];
            quizData.forEach(section => {
                section.questions.forEach(q => {
                    const userAnswer = state.answers[q.id] || "";
                    const userNorm = window.normalizeAnswer(userAnswer);
                    const correctNorm = window.normalizeAnswer(q.correct);

                    if (userNorm === correctNorm) {
                        currentScore += 1;
                    } else {
                        incorrectIds.push(q.id);
                    }
                });
            });
            state.score = currentScore;
            state.incorrectIds = incorrectIds;
            state.endTime = Date.now();
            state.submitTime = new Date();
            state.isSubmitted = true;
            state.showCompletedModal = true;
            renderApp();
        };

        window.captureAndReveal = () => {
            const captureArea = document.getElementById('capture-area');
            const btn = document.getElementById('capture-btn');
            const btnText = document.getElementById('capture-btn-text');

            if (!captureArea || !btn) return;

            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            const originalText = btnText.innerText;
            btnText.innerText = 'Đang xử lý...';

            setTimeout(() => {
                html2canvas(captureArea, {
                    scale: 3,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false,
                    onclone: function (clonedDoc) {
                        const clonedBtnText = clonedDoc.getElementById('capture-btn-text');
                        const clonedBtn = clonedDoc.getElementById('capture-btn');
                        if (clonedBtnText) clonedBtnText.innerText = originalText;
                        if (clonedBtn) {
                            clonedBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                            clonedBtn.style.opacity = '1';
                        }

                        const clonedArea = clonedDoc.getElementById('capture-area');
                        if (clonedArea) {
                            clonedArea.style.transform = 'none';
                            clonedArea.style.boxShadow = 'none';
                            clonedArea.style.border = 'none';
                        }

                        const clonedTitleBox = clonedDoc.getElementById('title-box');
                        if (clonedTitleBox) {
                            clonedTitleBox.style.border = 'none';
                            clonedTitleBox.style.background = 'transparent';
                            clonedTitleBox.style.boxShadow = 'none';
                            clonedTitleBox.style.padding = '0';
                        }

                        const clonedStatsBox = clonedDoc.getElementById('stats-box');
                        if (clonedStatsBox) {
                            clonedStatsBox.style.border = 'none';
                            clonedStatsBox.style.background = 'transparent';
                            clonedStatsBox.style.boxShadow = 'none';
                        }

                        const clonedWrongBox = clonedDoc.getElementById('wrong-answers-box');
                        if (clonedWrongBox) {
                            clonedWrongBox.style.border = 'none';
                            clonedWrongBox.style.background = 'transparent';
                            clonedWrongBox.style.boxShadow = 'none';
                        }

                        const valueBoxes = clonedDoc.querySelectorAll('.value-box, .wrong-q-box');
                        valueBoxes.forEach(box => {
                            box.style.border = 'none';
                            box.style.background = 'transparent';
                            box.style.boxShadow = 'none';
                            box.style.padding = '0';
                            box.style.margin = '0';

                            if (box.classList.contains('wrong-q-box')) {
                                box.style.marginRight = '10px';
                                box.style.color = '#dc2626';
                            } else {
                                box.style.color = '#1e293b';
                            }
                        });
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Ket_qua_IELTS_Reading_${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    state.hasCapturedScreenshot = true;
                    state.showCompletedModal = false;
                    renderApp();

                }).catch(err => {
                    console.error("Lỗi khi chụp ảnh:", err);
                    alert("Có lỗi xảy ra khi lưu ảnh. Bạn có thể xem đáp án ngay.");
                    state.hasCapturedScreenshot = true;
                    state.showCompletedModal = false;
                    renderApp();
                });
            }, 50);
        };

        window.resetQuiz = () => {
            state.showResetConfirm = true;
            renderApp();
        };

        window.cancelReset = () => {
            state.showResetConfirm = false;
            renderApp();
        };

        window.confirmReset = () => {
            state.answers = {};
            state.isSubmitted = false;
            state.score = 0;
            state.incorrectIds = [];
            state.startTime = Date.now();
            state.endTime = null;
            state.submitTime = null;
            state.expandedExplanations = {};
            state.showResetConfirm = false;
            state.hasCapturedScreenshot = false;
            state.showCompletedModal = false;
            state.notes = {};
            state.formattedPassage = null;
            state.formattedPassageTrans = null;
            state.formattedQuestions = {};

            renderApp();
        };

        window.togglePassageTranslation = () => {
            saveFormatting();
            state.showPassageTranslation = !state.showPassageTranslation;
            renderApp();
        };

        window.toggleExplanation = (qId) => {
            saveFormatting();
            state.expandedExplanations[qId] = !state.expandedExplanations[qId];
            renderApp();
        };

        window.toggleNote = (qId) => {
            saveFormatting();
            state.expandedNotes[qId] = !state.expandedNotes[qId];
            renderApp();
        };

        window.performScroll = (id) => {
            const container = document.getElementById('questions-container');
            const el = document.getElementById(`question-${id}`);

            if (container && el) {
                const containerTop = container.getBoundingClientRect().top;
                const elTop = el.getBoundingClientRect().top;
                const currentScroll = container.scrollTop;
                const targetScroll = currentScroll + (elTop - containerTop) - 20;

                container.scrollTo({ top: targetScroll, behavior: "smooth" });

                const wrapper = document.getElementById(`input-wrap-${id}`);
                if (wrapper) {
                    const inputEl = wrapper.querySelector('select');
                    if (inputEl) {
                        inputEl.focus();
                        inputEl.classList.add('bg-indigo-100', 'border-indigo-500');
                        setTimeout(() => inputEl.classList.remove('bg-indigo-100', 'border-indigo-500'), 1000);
                    }
                }
            }
        };

        window.scrollToQuestion = (id) => {
            performScroll(id);
        };

        // Start App
        renderApp();

    </script>
</body>

</html>
